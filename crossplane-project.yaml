apiVersion: dev.crossplane.io/v1alpha1
kind: Project
metadata:
  name: modelplane
spec:
  repository: xpkg.upbound.io/modelplane/modelplane
  source: github.com/modelplaneai/modelplane
  license: Apache-2.0
  description: An open-source AI inference platform built on Crossplane.
  architectures: [amd64, arm64]
  # compose-model-deployment and compose-model-cache match all resources of a
  # kind with a bare ResourceSelector, which Crossplane only honours from
  # v2.2.1 (https://github.com/crossplane/crossplane/pull/7241).
  crossplane:
    version: '>=v2.2.1'
  schemas:
    languages: [python]
  functions:
  - source: Tarball
    tarball:
      name: compose-eks-cluster
      pathPrefix: _output/functions/compose-eks-cluster
  - source: Tarball
    tarball:
      name: compose-gke-cluster
      pathPrefix: _output/functions/compose-gke-cluster
  - source: Tarball
    tarball:
      name: compose-inference-class
      pathPrefix: _output/functions/compose-inference-class
  - source: Tarball
    tarball:
      name: compose-inference-cluster
      pathPrefix: _output/functions/compose-inference-cluster
  - source: Tarball
    tarball:
      name: compose-inference-gateway
      pathPrefix: _output/functions/compose-inference-gateway
  - source: Tarball
    tarball:
      name: compose-serving-stack
      pathPrefix: _output/functions/compose-serving-stack
  - source: Tarball
    tarball:
      name: compose-model-cache
      pathPrefix: _output/functions/compose-model-cache
  - source: Tarball
    tarball:
      name: compose-model-deployment
      pathPrefix: _output/functions/compose-model-deployment
  - source: Tarball
    tarball:
      name: compose-model-endpoint
      pathPrefix: _output/functions/compose-model-endpoint
  - source: Tarball
    tarball:
      name: compose-model-replica
      pathPrefix: _output/functions/compose-model-replica
  - source: Tarball
    tarball:
      name: compose-model-service
      pathPrefix: _output/functions/compose-model-service
  dependencies:
  - type: crd
    git:
      repository: https://github.com/crossplane/crossplane
      ref: v2.3.2
      path: cluster/crds
  - type: xpkg
    xpkg:
      apiVersion: pkg.crossplane.io/v1
      kind: Provider
      package: xpkg.upbound.io/upbound/provider-gcp-container
      version: v2.5.0
  - type: xpkg
    xpkg:
      apiVersion: pkg.crossplane.io/v1
      kind: Provider
      package: xpkg.upbound.io/upbound/provider-gcp-compute
      version: v2.5.0
  - type: xpkg
    xpkg:
      apiVersion: pkg.crossplane.io/v1
      kind: Provider
      package: xpkg.upbound.io/upbound/provider-gcp-cloudplatform
      version: v2.5.0
  - type: xpkg
    xpkg:
      apiVersion: pkg.crossplane.io/v1
      kind: Provider
      package: xpkg.upbound.io/upbound/provider-aws-eks
      version: v2.5.0
  - type: xpkg
    xpkg:
      apiVersion: pkg.crossplane.io/v1
      kind: Provider
      package: xpkg.upbound.io/upbound/provider-aws-ec2
      version: v2.5.0
  - type: xpkg
    xpkg:
      apiVersion: pkg.crossplane.io/v1
      kind: Provider
      package: xpkg.upbound.io/upbound/provider-aws-iam
      version: v2.5.0
  - type: xpkg
    xpkg:
      apiVersion: pkg.crossplane.io/v1
      kind: Provider
      package: xpkg.upbound.io/upbound/provider-helm
      version: ">=v1.2.0"
  - type: xpkg
    xpkg:
      apiVersion: pkg.crossplane.io/v1
      kind: Provider
      package: xpkg.upbound.io/upbound/provider-kubernetes
      version: ">=v1.2.0"
