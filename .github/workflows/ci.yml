name: CI

on:
  push:
    branches:
      - main
  pull_request: {}
  workflow_dispatch: {}

# Cancel in-progress runs for the same PR. Runs on main are never cancelled.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Lint
        run: >
          nix build
          .#checks.x86_64-linux.python
          .#checks.x86_64-linux.shell-lint
          .#checks.x86_64-linux.nix-lint
          --print-build-logs

  unit-tests:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Build and Test
        run: nix run .#test-crossplane --print-build-logs

  push-package:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, unit-tests]
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed for git rev-list --count.

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      # Authenticate with the registry using standard Docker credentials.
      # The Crossplane CLI uses Docker's credential store for OCI pushes.
      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: xpkg.upbound.io
          username: ${{ secrets.UP_ROBOT_ID }}
          password: ${{ secrets.UP_ROBOT_TOKEN }}

      - name: Build and Push
        run: |
          nix run .#build-crossplane --print-build-logs
          nix run .#push-crossplane --print-build-logs
