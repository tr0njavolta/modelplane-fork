name: CI

on:
  push:
    branches:
      - main
  pull_request: {}
  workflow_dispatch: {}

# Cancel in-progress runs for the same PR. Runs on main are never cancelled.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Check
        run: nix flake check --print-build-logs

  push-package:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [check]
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      # The Crossplane CLI uses Docker's credential store for OCI pushes.
      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: xpkg.upbound.io
          username: ${{ secrets.UP_ROBOT_ID }}
          password: ${{ secrets.UP_ROBOT_TOKEN }}

      - name: Build and Push
        run: |
          nix run .#build-crossplane --print-build-logs
          nix run .#push-crossplane --print-build-logs
