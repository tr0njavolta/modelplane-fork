# Modelplane prerequisites. Apply once after installing Crossplane.
#
# These resources grant Crossplane and provider-helm the permissions
# needed to compose Gateway API, Envoy Gateway, and MetalLB resources.
# They cannot be self-composed because Crossplane needs the permissions
# before it can compose anything.
---
# Shared namespace for all Modelplane infrastructure resources.
apiVersion: v1
kind: Namespace
metadata:
  name: modelplane-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crossplane-compose-modelplane
  labels:
    rbac.crossplane.io/aggregate-to-crossplane: "true"
rules:
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["*"]
- apiGroups: ["gateway.networking.k8s.io"]
  resources: ["gateways", "gatewayclasses", "httproutes"]
  verbs: ["*"]
- apiGroups: ["gateway.envoyproxy.io"]
  resources: ["backends"]
  verbs: ["*"]
- apiGroups: ["metallb.io"]
  resources: ["ipaddresspools", "l2advertisements"]
  verbs: ["*"]
- apiGroups: ["protection.crossplane.io"]
  resources: ["usages"]
  verbs: ["*"]
---
# Give provider-helm a deterministic SA name so we can grant it
# permissions. Without this, the SA name has a random hash.
apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  name: provider-helm-modelplane
spec:
  serviceAccountTemplate:
    metadata:
      name: provider-helm-modelplane
---
# Grant provider-helm cluster-admin. Helm charts install arbitrary
# Kubernetes resources (Deployments, Services, RBAC, CRDs, etc.) and
# need broad permissions. A narrower role would break every time a
# chart adds a new resource type.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: provider-helm-modelplane
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: ServiceAccount
  name: provider-helm-modelplane
  namespace: crossplane-system
---
# Apply the DRC to provider-helm automatically via ImageConfig.
# Matches provider-helm by OCI image prefix and overrides its
# runtimeConfigRef at install time.
apiVersion: pkg.crossplane.io/v1beta1
kind: ImageConfig
metadata:
  name: provider-helm-modelplane
spec:
  matchImages:
  - type: Prefix
    prefix: xpkg.upbound.io/upbound/provider-helm
  runtime:
    configRef:
      name: provider-helm-modelplane
---
# Pull secret for Modelplane packages. Matches all packages from the
# negzupboundio organization and adds the pull secret automatically.
# Create the secret first:
#   kubectl create secret generic upbound-pull-secret \
#     --from-file=.dockerconfigjson=<path-to-docker-config.json> \
#     --type=kubernetes.io/dockerconfigjson \
#     -n crossplane-system
apiVersion: pkg.crossplane.io/v1beta1
kind: ImageConfig
metadata:
  name: modelplane-pull-secret
spec:
  matchImages:
  - type: Prefix
    prefix: xpkg.upbound.io/negzupboundio/
  registry:
    authentication:
      pullSecretRef:
        name: upbound-pull-secret
