# An EKS InferenceCluster with a two-node H200 pool over EFA, validated serving
# Kimi-K2 as a prefill/decode pair (one engine per node).
#
# The H200 nodes come from an EC2 Capacity Block reserved for ML. Set
# capacityReservationId to your own block's ID before applying:
#
#   curl -O https://modelplane.ai/docs/latest/examples/kimi-k2/inference-cluster.yaml
#   # edit inference-cluster.yaml: set capacityReservationId
#   kubectl apply -f inference-cluster.yaml
apiVersion: modelplane.ai/v1alpha1
kind: InferenceCluster
metadata:
  name: eks-coder
  labels:
    modelplane.ai/region: us
spec:
  cluster:
    source: EKS
    eks:
      region: us-east-2
  nodePools:
  - name: gpu-h200
    className: eks-h200-8x-p5en
    nodeCount: 2
    minNodeCount: 2
    maxNodeCount: 2
    zones:
    - us-east-2b
    fabric: EFA
    capacityBlock:
      capacityReservationId: cr-REPLACE_WITH_YOUR_RESERVATION_ID
