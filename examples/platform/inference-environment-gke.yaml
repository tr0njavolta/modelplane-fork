# An InferenceEnvironment backed by a GKE cluster.
#
# Modelplane provisions the full GKE cluster (VPC, subnet, node pools, service
# account, IAM bindings) and installs the inference stack (cert-manager,
# Envoy Gateway, Prometheus, KEDA, LeaderWorkerSet).
#
# The modelplane.ai/environment label is required for the ModelDeployment
# scheduler to discover this environment. Add additional labels to control
# placement via environmentSelector.
apiVersion: modelplane.ai/v1alpha1
kind: InferenceEnvironment
metadata:
  name: gke-us-central
  labels:
    modelplane.ai/environment: "true"
    modelplane.ai/region: us-central
spec:
  cluster:
    source: GKE
    gke:
      project: my-gcp-project  # Replace with your GCP project ID.
      region: us-central1

      nodePools:
        # System node pool for control plane components (Envoy, etc).
        - name: system
          role: System
          machineType: e2-standard-4
          nodeCount: 1
          minNodeCount: 1
          maxNodeCount: 2

        # GPU node pool for model serving. acceleratorType and acceleratorCount
        # are passed to GCP when provisioning the pool. memory is the per-GPU
        # VRAM and is used by the scheduler to compute available capacity.
        - name: gpu-l4
          role: GPU
          machineType: g2-standard-8
          gpu:
            acceleratorType: nvidia-l4
            acceleratorCount: 1
            memory: 24Gi
          nodeCount: 1
          minNodeCount: 0
          maxNodeCount: 4
          zones:
            - us-central1-a
            - us-central1-c
