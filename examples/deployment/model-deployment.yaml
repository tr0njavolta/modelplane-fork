# A ModelDeployment deploys a model from the catalog to one or more inference
# clusters. The scheduler picks clusters based on GPU capacity and optional
# label selectors.
#
# Once placed, the control plane creates a unified OpenAI-compatible endpoint:
#   http://<gateway-address>/<namespace>/<name>/v1/chat/completions
apiVersion: modelplane.ai/v1alpha1
kind: ModelDeployment
metadata:
  name: qwen-demo
  namespace: ml-team
spec:
  # Reference a ClusterModel by name. Use modelRef.kind: Model for namespaced
  # models.
  modelRef:
    name: qwen-2-5-0-5b

  # Deploy to one cluster. The scheduler picks the best fit based on the
  # model's serving profiles and available GPU capacity.
  clusters: 1

  # Optional: restrict placement to clusters with specific labels.
  # clusterSelector:
  #   matchLabels:
  #     modelplane.ai/region: us-central
