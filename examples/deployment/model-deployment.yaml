# A ModelDeployment deploys a model to one or more inference clusters.
# The scheduler picks clusters by clusterSelector labels and nodeSelector
# device requests, gated on available nodes. Each matched cluster gets one
# ModelReplica.
#
# The control plane creates a unified OpenAI-compatible endpoint:
#   http://<gateway-address>/<namespace>/<name>/v1/chat/completions
apiVersion: modelplane.ai/v1alpha1
kind: ModelDeployment
metadata:
  name: qwen-demo
  namespace: ml-team
spec:
  # Number of ModelReplicas to fan out to. Each replica is a complete
  # serving instance scheduled to one InferenceCluster.
  replicas: 1

  # Optional: restrict the scheduler to clusters with specific labels.
  # clusterSelector:
  #   matchLabels:
  #     modelplane.ai/region: us-central

  # Node-level matching: a list of DRA device requests. The scheduler matches
  # each request against a candidate pool's InferenceClass devices and pins the
  # replica to a pool that satisfies them. Each request's CEL is real DRA CEL
  # over a single device; quantity() and semver() are helpers. claim: DRA
  # devices also become requests in the DRA ResourceClaim the serving pods claim
  # GPUs through, so a deployment must declare the GPUs its model needs.
  nodeSelector:
    devices:
    - name: gpu
      count: 1
      selectors:
      # Qwen2.5-0.5B needs very little VRAM; 20Gi comfortably selects an L4
      # without over-constraining. A larger model would ask for more memory or a
      # specific architecture here. This CEL is real DRA CEL: the scheduler
      # matches it against the pool's declared device, and DRA matches it again
      # against the GPU's ResourceSlice when it binds the claim.
      - cel: |
          device.capacity["gpu.nvidia.com"].memory.compareTo(quantity("20Gi")) >= 0

  workers:
    # Compute topology for one worker. tensor=1 means one GPU per pod.
    topology:
      tensor: 1
    # Pod template for inference workers. The container named "engine"
    # is the inference engine; its image and args are passed through.
    template:
      spec:
        containers:
        - name: engine
          image: vllm/vllm-openai:v0.7.3
          args:
          - "--model=Qwen/Qwen2.5-0.5B-Instruct"
