# A ModelDeployment using multi-node tensor + pipeline parallelism.
#
# pipeline > 1 runs the model across multiple nodes, each with `tensor`
# GPUs. The scheduler picks a cluster with a pool that has at least
# `tensor` GPUs per node and at least `pipeline` available nodes.
# Modelplane composes a LeaderWorkerSet-backed llm-d serving instance on
# the remote cluster.
apiVersion: modelplane.ai/v1alpha1
kind: ModelDeployment
metadata:
  name: llama-405b
  namespace: ml-team
spec:
  replicas: 1

  clusterSelector:
    matchLabels:
      modelplane.ai/tier: production

  # Request 8 GPUs per node with enough memory for a 405B model. count matches
  # the tensor topology (GPUs per node); the scheduler pins the replica to a
  # pool whose devices satisfy this, and the request becomes a DRA DeviceRequest
  # the serving pods claim GPUs through. 70Gi selects an 80GB-class GPU (an H100
  # reports ~79Gi of its nominal 80GB): the threshold has to sit below the
  # device's real reported memory, since DRA evaluates this CEL against the
  # GPU's actual ResourceSlice at admission, not its marketing capacity.
  nodeSelector:
    devices:
    - name: gpu
      count: 8
      selectors:
      - cel: |
          device.capacity["gpu.nvidia.com"].memory.compareTo(quantity("70Gi")) >= 0

  workers:
    topology:
      tensor: 8        # 8 GPUs per node.
      pipeline: 2      # 2 nodes per worker.
    template:
      spec:
        containers:
        - name: engine
          image: vllm/vllm-openai:v0.9.1
          args:
          - "--model=meta-llama/Llama-3.1-405B-Instruct"
          - "--tensor-parallel-size=8"
          - "--pipeline-parallel-size=2"
          - "--max-model-len=131072"
