# A ModelDeployment serving one model across two nodes.
#
# An engine with a Leader and one or more Workers spans multiple nodes. A gang
# is the Leader plus worker.nodes workers. The scheduler picks a cluster with a
# pool that has enough GPUs per node and enough nodes for the whole gang, and
# Modelplane composes a LeaderWorkerSet-backed serving instance on it.
#
# This example runs Qwen2.5-7B pipeline-parallel across two single-GPU nodes
# (validated on 2x NVIDIA L4). Parallelism is the engine's concern: Modelplane
# injects no flags. The leader starts the engine's coordination head and
# serves; the follower joins it, addressing the leader through
# $(MODELPLANE_LEADER_ADDRESS), which Modelplane injects into every engine
# container of the gang.
#
# The launch commands use vLLM's bundled multi-node-serving.sh helper rather
# than raw `ray start`. Its `leader` subcommand starts the Ray head and blocks
# until the whole gang has joined (--ray_cluster_size) before `vllm serve`
# runs, and its `worker` subcommand retries the join - removing the race where
# the leader's engine starts before the follower joins. The helper appends
# Ray's default port itself, so the worker passes the bare leader address.
#
# Multi-node engines require a ModelCache: every pod in the gang mounts it at
# /mnt/models. When a member brings its own `command`, Modelplane does not
# inject --model, so the leader points `vllm serve` at the mount explicitly.
apiVersion: modelplane.ai/v1alpha1
kind: ModelDeployment
metadata:
  name: qwen-7b
  namespace: ml-team
spec:
  replicas: 1

  modelCacheRef:
    name: qwen-7b

  engines:
  - name: qwen-7b
    members:
    # The Leader runs the Ray head and serves the OpenAI API on port 8000
    # (Modelplane's serving contract: port 8000, /health readiness).
    #
    # Both members ask for one L4-class GPU per node: this gang is
    # homogeneous, so they repeat the same nodeSelector and the scheduler
    # prefers to place them on one pool. The threshold has to sit below the
    # device's real reported memory (an L4 reports ~22.5Gi of its nominal
    # 24GB), since the scheduler and DRA match against what the driver
    # actually reports.
    - role: Leader
      nodeSelector:
        devices:
        - name: gpu
          count: 1
          selectors:
          - cel: |
              device.capacity["gpu.nvidia.com"].memory.compareTo(quantity("20Gi")) >= 0
      template:
        spec:
          containers:
          - name: engine
            image: vllm/vllm-openai:v0.11.0
            command:
            - /bin/sh
            - -c
            - >-
              bash /vllm-workspace/examples/online_serving/multi-node-serving.sh
              leader --ray_cluster_size=$(LWS_GROUP_SIZE);
              exec vllm serve /mnt/models
              --served-model-name=qwen-7b
              --tensor-parallel-size=1
              --pipeline-parallel-size=2
              --distributed-executor-backend=ray
              --max-model-len=4096
              --gpu-memory-utilization=0.90
              --port=8000
    # One Worker (per worker.nodes): the gang spans 1 (leader) + 1 2 nodes.
    - role: Worker
      worker:
        nodes: 1
      nodeSelector:
        devices:
        - name: gpu
          count: 1
          selectors:
          - cel: |
              device.capacity["gpu.nvidia.com"].memory.compareTo(quantity("20Gi")) >= 0
      template:
        spec:
          containers:
          - name: engine
            image: vllm/vllm-openai:v0.11.0
            command:
            - /bin/sh
            - -c
            - >-
              bash /vllm-workspace/examples/online_serving/multi-node-serving.sh
              worker --ray_address=$(MODELPLANE_LEADER_ADDRESS)
---
# The shared, read-write-many cache the gang serves from. Hydrated once per
# matched cluster; every gang pod mounts it at /mnt/models.
apiVersion: modelplane.ai/v1alpha1
kind: ModelCache
metadata:
  name: qwen-7b
  namespace: ml-team
spec:
  source: HuggingFace
  huggingFace:
    repo: Qwen/Qwen2.5-7B-Instruct  # Public repo; no authSecret needed.
    sizeGiB: 40
