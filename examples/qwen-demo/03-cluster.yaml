# An InferenceCluster wrapping an existing GKE cluster.
#
# The GKE cluster was provisioned separately (e.g. via GKECluster XR).
# Modelplane installs the serving stack (LeaderWorkerSet, Gateway API + Inference Extension, Envoy Gateway, cert-manager, Prometheus)
# and uses the cluster's kubeconfig to deploy models.
#
# The kubeconfig and SA key Secrets must exist in modelplane-system
# before applying this resource.
apiVersion: modelplane.ai/v1alpha1
kind: InferenceCluster
metadata:
  name: demo-us-central
  labels:
    modelplane.ai/region: us-central
spec:
  cluster:
    source: Existing
    existing:
      secretRef:
        name: demo-us-central-kubeconfig
        key: kubeconfig
      identitySecretRef:
        name: demo-us-central-sa-key
        key: private_key
  nodePools:
  - name: gpu-l4
    className: gke-l4-1x-g2
    nodeCount: 1
---
