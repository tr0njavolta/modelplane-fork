# Tool configuration for ruff and pyright. The Crossplane CLI handles building
# and packaging composition functions — this file is for linting and
# type-checking.

[tool.ruff]
target-version = "py312"
# Match ruff format's default. The formatter won't produce lines longer than
# this, but string literals in deeply nested dicts can still exceed it.
line-length = 120

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort (import ordering)
    "N",      # pep8-naming
    "UP",     # pyupgrade (modern Python idioms)
    "A",      # flake8-builtins (shadowing builtins)
    "B",      # flake8-bugbear (common gotchas)
    "PL",     # pylint subset
    "SIM",    # flake8-simplify (simplifiable constructs)
    "RET",    # flake8-return (return statement issues)
    "ARG",    # flake8-unused-arguments
]

[tool.ruff.lint.pylint]
# Builder functions like helm_release use named parameters for clarity.
max-args = 8

[tool.ruff.lint.per-file-ignores]
# Generated models are not under our control.
"schemas/python/**" = ["ALL"]
# Tests use magic values, many parameters, and long hardcoded resource dicts.
"**/tests/**" = ["E501", "PLR2004", "PLR0913"]
# fn.py uses gRPC's required PascalCase method name.
"functions/*/function/fn.py" = ["N802"]

[tool.pyright]
pythonVersion = "3.12"
include = ["functions"]
exclude = ["schemas"]
