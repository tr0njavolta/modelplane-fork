# Pull secret for xpkg.upbound.io/negzupboundio/ packages.
#
# The .dockerconfigjson contains a temporary Upbound session credential
# generated by `up ctp pull-secret create`. It grants read access to the
# negzupboundio organization's OCI packages.
#
# Generated: April 15, 2026
# Expires:   ~May 15, 2026 (30-day credential)
#
# Regenerate with: up ctp pull-secret create -n crossplane-system upbound-pull-secret
#
# This is committed to the repo because:
# - The repo is currently private (Upbound internal only).
# - The token only grants pull access to packages that will be made public when
#   the repo goes public.
# - At that point this file and the ImageConfig in the prerequisites can be
#   removed.
apiVersion: v1
kind: Secret
metadata:
  name: upbound-pull-secret
  namespace: crossplane-system
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: 
