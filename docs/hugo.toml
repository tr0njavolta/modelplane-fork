baseURL = "/"
languageCode = "en-us"
title = "Modelplane Docs"
theme = "geekboot"
enableRobotsTXT = true
enableGitInfo = true

disableKinds = ["taxonomy", "term"]
ignoreFiles = ["themes/geekboot/content/.*", "README.md"]

[outputs]
  home = ["html"]
  section = ["html", "rss"]


[build]
  # Emit hugo_stats.json listing the tags, classes, and IDs the site uses.
  # PurgeCSS reads it to strip unused CSS rules. See postcss.config.js.
  [build.buildStats]
    enable = true

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 1
    endLevel = 9
  [markup.highlight]
    codeFences = true
    noClasses = false
    linenos = true
    anchorLineNos = true
    lineNumbersInTable = false

[module]
  [[module.mounts]]
    source = "content"
    target = "content"
  [[module.mounts]]
    source = "assets"
    target = "assets"
  [[module.mounts]]
    source = "content"
    target = "assets/content"
    includeFiles = ["**/**.png", "**/**.jpg", "**/**.jpeg", "**/**.gif"]
  # Re-include the project's own data directory — required because defining
  # any module mount switches Hugo to a virtual filesystem that excludes
  # unmounted local directories.
  [[module.mounts]]
    source = "data"
    target = "data"
  # Mount the APIs directory as Hugo data so the built-in crds partial can
  # read definition.yaml files without a separate generation step.
  # Accessible as site.Data.apis.crds.<plural>.definition
  [[module.mounts]]
    source = "../apis"
    target = "data/apis/crds"

[security]
  [security.funcs]
    getenv = ["^CONTEXT", "^REVIEW_ID"]

[params]
  docs = true
  description = "Modelplane documentation."
  [params.anchors]
    min = 2
    max = 5
