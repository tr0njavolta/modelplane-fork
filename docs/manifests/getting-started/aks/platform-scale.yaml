apiVersion: modelplane.ai/v1alpha1
kind: InferenceClass
metadata:
  name: a100-1x
spec:
  description: "AKS Standard_NC24ads_A100_v4, 1x NVIDIA A100 80GB"
  provisioning:
    provider: AKS
    aks:
      vmSize: Standard_NC24ads_A100_v4
      diskSizeGb: 200
      accelerator:
        type: nvidia-a100
        count: 1
  devices:
  - name: gpu
    claim: DRA
    driver: gpu.nvidia.com
    deviceClassName: gpu.nvidia.com
    count: 1
    attributes:
      architecture: { string: Ampere }
      cudaComputeCapability: { version: "8.0.0" }
    capacity:
      memory: { value: "81920Mi" }
---
# verify: Standard_NC24ads_A100_v4 quota/availability in eastus and southcentralus.
apiVersion: modelplane.ai/v1alpha1
kind: InferenceCluster
metadata:
  name: aks-eastus
  labels:
    modelplane.ai/region: eastus
spec:
  cluster:
    source: AKS
    aks:
      location: eastus
  nodePools:
  - name: gpua100
    className: a100-1x
    nodeCount: 1
    minNodeCount: 1
    maxNodeCount: 1
---
apiVersion: modelplane.ai/v1alpha1
kind: InferenceCluster
metadata:
  name: aks-southcentralus
  labels:
    modelplane.ai/region: southcentralus
spec:
  cluster:
    source: AKS
    aks:
      location: southcentralus
  nodePools:
  - name: gpua100
    className: a100-1x
    nodeCount: 1
    minNodeCount: 1
    maxNodeCount: 1
