# An InferenceClass describing AKS Standard_ND96isr_H100_v5 with 8x
# NVIDIA H100.
#
# The provisioning block tells Modelplane how to create a node pool of
# this class on AKS. Azure sizes nodes by VM size, which determines the
# GPU model and count; the accelerator block is informational. The
# devices block describes what hardware a node of this class has,
# DRA-style - used by the scheduler to match models to clusters, and to
# form DRA ResourceClaims for claim: DRA devices.
apiVersion: modelplane.ai/v1alpha1
kind: InferenceClass
metadata:
  name: aks-h100-8x
spec:
  description: "AKS Standard_ND96isr_H100_v5, 8x NVIDIA H100 80GB"
  provisioning:
    provider: AKS
    aks:
      vmSize: Standard_ND96isr_H100_v5
      diskSizeGb: 200
      accelerator:
        type: nvidia-h100
        count: 8
  devices:
  - name: gpu
    claim: DRA
    driver: gpu.nvidia.com
    deviceClassName: gpu.nvidia.com
    count: 8
    attributes:
      architecture: { string: Hopper }
      cudaComputeCapability: { version: "9.0.0" }
    capacity:
      # The H100 80GB's real usable VRAM, what the NVIDIA DRA driver reports,
      # not its nominal 80GB. A nodeSelector asking for >= 80Gi would never bind.
      memory: { value: "81559Mi" }
