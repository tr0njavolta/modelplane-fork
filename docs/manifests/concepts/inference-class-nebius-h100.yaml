# An InferenceClass describing Nebius gpu-h100-sxm with 8x NVIDIA H100.
#
# The provisioning block tells Modelplane how to create a node group of
# this class on Nebius mk8s. Nebius sizes nodes by platform + preset
# rather than an instance type; the preset determines the GPU, vCPU,
# and memory shape of each node. The devices block describes what
# hardware a node of this class has, DRA-style - used by the scheduler
# to match models to clusters, and to form DRA ResourceClaims for
# claim: DRA devices.
apiVersion: modelplane.ai/v1alpha1
kind: InferenceClass
metadata:
  name: nebius-h100-8x
spec:
  description: "Nebius gpu-h100-sxm, 8x NVIDIA H100 80GB"
  provisioning:
    provider: Nebius
    nebius:
      platform: gpu-h100-sxm
      preset: 8gpu-128vcpu-1600gb
      diskSizeGb: 200
      driversPreset: cuda13.0
      accelerator:
        type: nvidia-h100
        count: 8
  devices:
  - name: gpu
    claim: DRA
    driver: gpu.nvidia.com
    deviceClassName: gpu.nvidia.com
    count: 8
    attributes:
      architecture: { string: Hopper }
      cudaComputeCapability: { version: "9.0.0" }
    capacity:
      # The H100 80GB's real usable VRAM, what the NVIDIA DRA driver reports,
      # not its nominal 80GB. A nodeSelector asking for >= 80Gi would never bind.
      memory: { value: "81559Mi" }
