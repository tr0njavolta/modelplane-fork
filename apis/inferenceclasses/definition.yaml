apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: inferenceclasses.modelplane.ai
spec:
  group: modelplane.ai
  names:
    categories: [crossplane, modelplane]
    kind: InferenceClass
    plural: inferenceclasses
    shortNames: [icl]
  scope: Cluster
  versions:
  - name: v1alpha1
    served: true
    referenceable: true
    schema:
      openAPIV3Schema:
        type: object
        required: [spec]
        properties:
          spec:
            type: object
            required: [devices]
            properties:
              description:
                type: string
                description: >-
                  Human-readable description of the class.
              provisioning:
                type: object
                description: >-
                  How to provision a node pool of this class. Omit for
                  classes that describe BYO node pools that already exist.
                required: [provider]
                x-kubernetes-validations:
                - rule: "self.provider != 'GKE' || has(self.gke)"
                  message: spec.provisioning.gke is required when spec.provisioning.provider is GKE.
                - rule: "self.provider != 'EKS' || has(self.eks)"
                  message: spec.provisioning.eks is required when spec.provisioning.provider is EKS.
                properties:
                  provider:
                    type: string
                    enum: [GKE, EKS]
                  gke:
                    type: object
                    required: [machineType, accelerator]
                    properties:
                      machineType:
                        type: string
                        minLength: 1
                      diskSizeGb:
                        type: integer
                        default: 100
                        minimum: 10
                      accelerator:
                        type: object
                        description: >-
                          GPU accelerator to attach when provisioning the node
                          pool. Provisioning input only: the scheduler matches
                          against spec.devices, not this block, so count here is
                          the GCP machine's GPU count and need not be restated in
                          devices.
                        required: [type, count]
                        properties:
                          type:
                            type: string
                            description: >-
                              GPU accelerator type passed to GCP (e.g.
                              nvidia-l4, nvidia-h100-80gb).
                            minLength: 1
                            maxLength: 63
                          count:
                            type: integer
                            minimum: 1
                            maximum: 16
                  eks:
                    type: object
                    required: [instanceType, accelerator]
                    properties:
                      instanceType:
                        type: string
                        description: >-
                          EC2 instance type (e.g. g6.xlarge,
                          p4d.24xlarge). The instance family determines
                          the GPU model; the accelerator block below is
                          informational.
                        minLength: 1
                      diskSizeGb:
                        type: integer
                        default: 100
                        minimum: 10
                      accelerator:
                        type: object
                        description: >-
                          GPU accelerator to attach when provisioning the node
                          group. Provisioning input only: the scheduler matches
                          against spec.devices, not this block.
                        required: [type, count]
                        properties:
                          type:
                            type: string
                            description: >-
                              GPU accelerator type (e.g. nvidia-a10g,
                              nvidia-h100). Informational - reported on
                              the consuming InferenceCluster's status.
                            minLength: 1
                            maxLength: 63
                          count:
                            type: integer
                            minimum: 1
                            maximum: 16
              devices:
                type: array
                description: >-
                  Devices a node of this class has, following DRA's model
                  (KEP-4381). Each entry describes one kind of device with a
                  count, mirroring what a DRA driver publishes in a
                  ResourceSlice (one entry per kind rather than per physical
                  device). ModelDeployment.nodeSelector matches against these,
                  and claim: DRA devices are emitted as requests in a DRA
                  ResourceClaim when scheduling a worker to this pool.

                  A scheduled worker pod is pinned to its pool with a
                  nodeSelector on the modelplane.ai/pool node label.
                  Modelplane-provisioned (EKS, GKE) pools carry this label
                  automatically. On a BYO (Existing) cluster Modelplane doesn't
                  provision the nodes, so the operator must label the pool's
                  nodes modelplane.ai/pool=<nodePools[].name> themselves, or
                  worker pods for this class will stay Pending.
                minItems: 1
                maxItems: 16
                x-kubernetes-list-type: map
                x-kubernetes-list-map-keys: [name]
                items:
                  type: object
                  required: [name, driver]
                  properties:
                    name:
                      type: string
                      description: >-
                        Name of this device within the class (e.g. gpu, nic).
                      minLength: 1
                      maxLength: 63
                    claim:
                      type: string
                      description: >-
                        How Modelplane treats this device. DRA emits it as a
                        request in a ResourceClaim, so DRA binds a matching
                        device to the pod at admission time; use it for hardware
                        a real DRA driver exposes. Synthetic describes the device
                        for fleet scheduling only and never claims it; use it for
                        hardware that matters for placement but has no DRA driver
                        yet, like an InfiniBand fabric.
                      enum: [DRA, Synthetic]
                      default: DRA
                    driver:
                      type: string
                      description: >-
                        DRA driver that owns this device (e.g. gpu.nvidia.com).
                        Becomes the attribute/capacity domain a nodeSelector
                        reads as device.attributes["<driver>"].<name>.
                      minLength: 1
                      maxLength: 253
                    deviceClassName:
                      type: string
                      description: >-
                        Name of the cluster-scoped DRA DeviceClass to claim this
                        device through. Required for claim: DRA devices; the DRA
                        driver install creates the DeviceClass (e.g.
                        gpu.nvidia.com). Ignored for Synthetic devices.
                      minLength: 1
                      maxLength: 253
                    count:
                      type: integer
                      description: How many of this device a node has.
                      default: 1
                      minimum: 1
                      maximum: 64
                    attributes:
                      type: object
                      description: >-
                        DRA-style typed attributes for this device. Keys are
                        bare names (e.g. architecture); the domain comes from the
                        device's driver. Each value sets exactly one typed field.
                      maxProperties: 32
                      additionalProperties:
                        type: object
                        properties:
                          string:
                            type: string
                            maxLength: 253
                          version:
                            type: string
                            description: Semantic version (e.g. "9.0.0").
                            maxLength: 32
                          bool:
                            type: boolean
                          int:
                            type: integer
                            format: int64
                        x-kubernetes-validations:
                        - rule: "[has(self.string), has(self.version), has(self.bool), has(self.int)].filter(x, x).size() == 1"
                          message: "exactly one of string, version, bool, int must be set"
                    capacity:
                      type: object
                      description: >-
                        DRA-style capacity quantities for this device. Keys are
                        bare names (e.g. memory); values are Kubernetes
                        Quantities.
                      maxProperties: 32
                      additionalProperties:
                        type: object
                        required: [value]
                        properties:
                          value:
                            type: string
                            description: A Kubernetes Quantity (e.g. "141Gi").
                            minLength: 1
                            maxLength: 32
                  x-kubernetes-validations:
                  - rule: "self.claim != 'DRA' || has(self.deviceClassName)"
                    message: "deviceClassName is required when claim is DRA"
          status:
            type: object
            properties:
              conditions:
                type: array
                items:
                  type: object
