apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: inferenceclusters.modelplane.ai
spec:
  group: modelplane.ai
  names:
    categories: [crossplane, modelplane]
    kind: InferenceCluster
    plural: inferenceclusters
    shortNames: [ic]
  scope: Cluster
  versions:
  - name: v1alpha1
    served: true
    referenceable: true
    additionalPrinterColumns:
    - name: SOURCE
      type: string
      jsonPath: .spec.cluster.source
    - name: GATEWAY
      type: string
      jsonPath: .status.gateway.address
    schema:
      openAPIV3Schema:
        type: object
        required: [spec]
        properties:
          spec:
            type: object
            required: [cluster]
            properties:
              cluster:
                type: object
                required: [source]
                x-kubernetes-validations:
                - rule: "self.source != 'Existing' || has(self.existing)"
                  message: spec.cluster.existing is required when spec.cluster.source is Existing.
                - rule: "self.source != 'GKE' || has(self.gke)"
                  message: spec.cluster.gke is required when spec.cluster.source is GKE.
                - rule: "self.source != 'EKS' || has(self.eks)"
                  message: spec.cluster.eks is required when spec.cluster.source is EKS.
                properties:
                  source:
                    type: string
                    description: >-
                      Cluster provisioning method.
                    enum: [GKE, EKS, Existing]
                  existing:
                    type: object
                    description: >-
                      Bring-your-own cluster configuration. Required when
                      source is Existing. Modelplane manages the inference
                      stack on the cluster but does not provision the
                      cluster itself.
                    required: [secretRef]
                    properties:
                      secretRef:
                        type: object
                        description: >-
                          Reference to a Secret containing a kubeconfig
                          for the existing cluster. The Secret must exist
                          in the modelplane-system namespace.
                        required: [name]
                        properties:
                          name:
                            type: string
                            minLength: 1
                            maxLength: 253
                          key:
                            type: string
                            default: kubeconfig
                            minLength: 1
                            maxLength: 253
                      identitySecretRef:
                        type: object
                        description: >-
                          Optional reference to a Secret containing cloud
                          provider credentials for IAM-based authentication.
                        required: [name]
                        properties:
                          name:
                            type: string
                            minLength: 1
                            maxLength: 253
                          key:
                            type: string
                            default: private_key
                            minLength: 1
                            maxLength: 253
                      cache:
                        type: object
                        description: >-
                          ModelCache configuration for this cluster.
                        properties:
                          storageClassName:
                            type: string
                            default: modelplane-rwx
                            description: >-
                              Name of the RWX StorageClass for ModelCache
                              PVCs. The admin creates the StorageClass on
                              the workload cluster (must support
                              ReadWriteMany dynamic provisioning).
                            minLength: 1
                  gke:
                    type: object
                    description: >-
                      GKE cluster configuration. Required when source is GKE.
                    required: [project, region]
                    properties:
                      project:
                        type: string
                        minLength: 6
                        maxLength: 30
                      region:
                        type: string
                        minLength: 1
                        maxLength: 32
                      kubernetesVersion:
                        type: string
                        default: "1.35"
                      cache:
                        type: object
                        description: >-
                          ModelCache configuration for this cluster.
                        properties:
                          storageClassName:
                            type: string
                            default: modelplane-rwx
                            description: >-
                              Name of the RWX StorageClass for ModelCache
                              PVCs. At the default value, Modelplane
                              provisions Filestore Enterprise via the
                              Filestore CSI addon and composes the
                              StorageClass; set this to a different name to
                              use one the admin has already created.
                            minLength: 1
                  eks:
                    type: object
                    description: >-
                      EKS cluster configuration. Required when source is EKS.
                    required: [region]
                    properties:
                      region:
                        type: string
                        description: >-
                          AWS region for the cluster (e.g. us-west-2).
                        minLength: 1
                        maxLength: 32
                      kubernetesVersion:
                        type: string
                        default: "1.36"
                        description: >-
                          EKS cluster Kubernetes version. Defaults to a
                          version where Dynamic Resource Allocation (how GPUs
                          bind to pods) is generally available.
                      cache:
                        type: object
                        description: >-
                          ModelCache configuration for this cluster.
                        properties:
                          storageClassName:
                            type: string
                            default: modelplane-rwx-efs
                            description: >-
                              Name of the RWX StorageClass for ModelCache
                              PVCs. Modelplane does not currently provision
                              EFS automatically; the admin must create an
                              EFS file system and the EFS CSI
                              StorageClass on the cluster.
                            minLength: 1
              nodePools:
                type: array
                description: >-
                  GPU node pools available on this cluster. Each pool
                  references an InferenceClass that describes the
                  hardware shape and (for provisioned clusters) how to
                  create the pool. System pools for control-plane
                  components are provisioned automatically.
                minItems: 1
                maxItems: 8
                x-kubernetes-list-type: map
                x-kubernetes-list-map-keys: [name]
                items:
                  type: object
                  required: [name, className]
                  properties:
                    name:
                      type: string
                      maxLength: 40
                    className:
                      type: string
                      description: >-
                        Name of the InferenceClass describing this pool's
                        hardware.
                      minLength: 1
                      maxLength: 253
                    nodeCount:
                      type: integer
                      default: 1
                      minimum: 0
                    minNodeCount:
                      type: integer
                      minimum: 0
                    maxNodeCount:
                      type: integer
                      description: >-
                        Maximum node count for autoscaling. Omit for
                        fixed-size pools.
                      minimum: 1
                    zones:
                      type: array
                      description: >-
                        Zones to restrict this node pool to. Required for
                        provisioned pools because not all zones in a
                        region have every GPU type.
                      items:
                        type: string
          status:
            type: object
            properties:
              providerConfigRef:
                type: object
                properties:
                  name:
                    type: string
                    description: >-
                      Name of the ProviderConfig targeting the remote cluster.
                      Used by ModelReplica to create resources on the cluster.
              gateway:
                type: object
                properties:
                  address:
                    type: string
                    description: >-
                      External IP of the inference gateway on the remote cluster.
                      Used by ModelDeployment for unified endpoint routing.
              gpuPools:
                type: array
                description: >-
                  Schedulable GPU node pools on this cluster, derived from the
                  referenced classes and the per-pool node counts.
                  ModelDeployment scheduling matches against these.
                maxItems: 8
                x-kubernetes-list-type: map
                x-kubernetes-list-map-keys: [name]
                items:
                  type: object
                  required: [name]
                  properties:
                    name:
                      type: string
                      description: >-
                        Node pool name, matching spec.nodePools[].name.
                        Used to pin a ModelReplica to a specific pool via
                        spec.nodePoolName.
                    nodes:
                      type: integer
                      description: >-
                        Number of nodes in this pool. Derived from
                        maxNodeCount (if autoscaling) or nodeCount.
                    devices:
                      type: array
                      description: >-
                        Devices copied from the pool's InferenceClass.
                        ModelDeployment.nodeSelector matches against these.
                      maxItems: 16
                      x-kubernetes-list-type: map
                      x-kubernetes-list-map-keys: [name]
                      items:
                        type: object
                        required: [name, driver]
                        properties:
                          name:
                            type: string
                            maxLength: 63
                          claim:
                            type: string
                            enum: [DRA, Synthetic]
                          driver:
                            type: string
                            maxLength: 253
                          deviceClassName:
                            type: string
                            maxLength: 253
                          count:
                            type: integer
                          attributes:
                            type: object
                            maxProperties: 32
                            additionalProperties:
                              type: object
                              properties:
                                string:
                                  type: string
                                  maxLength: 253
                                version:
                                  type: string
                                  maxLength: 32
                                bool:
                                  type: boolean
                                int:
                                  type: integer
                                  format: int64
                          capacity:
                            type: object
                            maxProperties: 32
                            additionalProperties:
                              type: object
                              required: [value]
                              properties:
                                value:
                                  type: string
                                  maxLength: 32
              namespace:
                type: string
                description: >-
                  Namespace where the internal XRs (cluster, backend) were created.
