apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: inferenceclusters.modelplane.ai
spec:
  group: modelplane.ai
  names:
    categories: [crossplane, modelplane]
    kind: InferenceCluster
    plural: inferenceclusters
    shortNames: [ic]
  scope: Cluster
  versions:
  - name: v1alpha1
    served: true
    referenceable: true
    additionalPrinterColumns:
    - name: SOURCE
      type: string
      jsonPath: .spec.cluster.source
    - name: GATEWAY
      type: string
      jsonPath: .status.gateway.address
    schema:
      openAPIV3Schema:
        type: object
        required: [spec]
        properties:
          spec:
            type: object
            required: [cluster]
            x-kubernetes-validations:
            - rule: "self.cluster.source != 'Nebius' || !has(self.nodePools) || self.nodePools.all(p, !has(p.fabric) || p.fabric.type != 'InfiniBand' || has(p.fabric.infiniband))"
              message: fabric.infiniband is required when fabric.type is InfiniBand and cluster.source is Nebius.
            properties:
              cluster:
                type: object
                required: [source]
                x-kubernetes-validations:
                - rule: "self.source != 'Existing' || has(self.existing)"
                  message: spec.cluster.existing is required when spec.cluster.source is Existing.
                - rule: "self.source != 'GKE' || has(self.gke)"
                  message: spec.cluster.gke is required when spec.cluster.source is GKE.
                - rule: "self.source != 'EKS' || has(self.eks)"
                  message: spec.cluster.eks is required when spec.cluster.source is EKS.
                - rule: "self.source != 'AKS' || has(self.aks)"
                  message: spec.cluster.aks is required when spec.cluster.source is AKS.
                - rule: "self.source != 'Nebius' || has(self.nebius)"
                  message: spec.cluster.nebius is required when spec.cluster.source is Nebius.
                properties:
                  source:
                    type: string
                    description: >-
                      Cluster provisioning method.
                    enum: [GKE, EKS, AKS, Nebius, Existing]
                  existing:
                    type: object
                    description: >-
                      Bring-your-own cluster configuration. Required when
                      source is Existing. Modelplane manages the inference
                      stack on the cluster but does not provision the
                      cluster itself.
                    required: [secretRef]
                    properties:
                      secretRef:
                        type: object
                        description: >-
                          Reference to a Secret containing a kubeconfig
                          for the existing cluster. The Secret must exist
                          in the modelplane-system namespace.
                        required: [name]
                        properties:
                          name:
                            type: string
                            minLength: 1
                            maxLength: 253
                          key:
                            type: string
                            default: kubeconfig
                            minLength: 1
                            maxLength: 253
                      identitySecretRef:
                        type: object
                        description: >-
                          Optional reference to a Secret containing cloud
                          provider credentials for IAM-based authentication.
                          The type selects which cloud identity the
                          ProviderConfigs authenticate as, and must match the
                          cloud the existing cluster runs on.
                        required: [name]
                        properties:
                          name:
                            type: string
                            minLength: 1
                            maxLength: 253
                          key:
                            type: string
                            default: private_key
                            minLength: 1
                            maxLength: 253
                          type:
                            type: string
                            description: >-
                              Cloud identity type the credential authenticates
                              as. Must match the cloud the existing cluster runs
                              on. Defaults to GoogleApplicationCredentials.
                            default: GoogleApplicationCredentials
                            enum:
                            - GoogleApplicationCredentials
                            - AWSWebIdentityCredentials
                            - NebiusServiceAccountCredentials
                      cache:
                        type: object
                        description: >-
                          ModelCache configuration for this cluster.
                        properties:
                          storageClassName:
                            type: string
                            description: >-
                              Name of an existing ReadWriteMany StorageClass
                              for ModelCache PVCs. Modelplane doesn't provision
                              storage on an existing cluster, so the admin must
                              create the StorageClass (it must support
                              ReadWriteMany dynamic provisioning).
                            minLength: 1
                            maxLength: 253
                  gke:
                    type: object
                    description: >-
                      GKE cluster configuration. Required when source is GKE.
                    required: [project, region]
                    properties:
                      project:
                        type: string
                        minLength: 6
                        maxLength: 30
                      region:
                        type: string
                        minLength: 1
                        maxLength: 32
                      kubernetesVersion:
                        type: string
                        default: "1.35"
                  eks:
                    type: object
                    description: >-
                      EKS cluster configuration. Required when source is EKS.
                    required: [region]
                    properties:
                      region:
                        type: string
                        description: >-
                          AWS region for the cluster (e.g. us-west-2).
                        minLength: 1
                        maxLength: 32
                      kubernetesVersion:
                        type: string
                        default: "1.36"
                        description: >-
                          EKS cluster Kubernetes version. Defaults to a
                          version where Dynamic Resource Allocation (how GPUs
                          bind to pods) is generally available.
                  aks:
                    type: object
                    description: >-
                      AKS cluster configuration. Required when source is AKS.
                    required: [location]
                    properties:
                      location:
                        type: string
                        description: >-
                          Azure region for the cluster (e.g. westeurope,
                          eastus2).
                        minLength: 1
                        maxLength: 32
                      kubernetesVersion:
                        type: string
                        default: "1.34"
                        description: >-
                          AKS cluster Kubernetes version. Defaults to a
                          version where Dynamic Resource Allocation (how GPUs
                          bind to pods) is generally available.
                  nebius:
                    type: object
                    description: >-
                      Nebius mk8s cluster configuration. Required when source
                      is Nebius; may be empty, since every field has a
                      default. The cluster is created in the project the
                      Nebius ClusterProviderConfig named default sets as its
                      projectID; Nebius projects are bound to a region, so
                      the project also determines where the cluster runs.
                    properties:
                      kubernetesVersion:
                        type: string
                        default: "1.34"
                        description: >-
                          mk8s cluster Kubernetes version. Defaults to a
                          version where Dynamic Resource Allocation (DRA)
                          is generally available.
              taints:
                type: array
                description: >-
                  Taints that repel ModelDeployments from this cluster unless
                  they carry a matching toleration, following the Kubernetes
                  taint model. NoSchedule keeps new replicas off the cluster
                  while leaving existing ones in place; NoExecute additionally
                  drains the replicas already here, which the scheduler
                  reschedules onto other tolerated clusters (the declarative
                  equivalent of draining a node before maintenance).
                x-kubernetes-list-type: map
                x-kubernetes-list-map-keys: [key, effect]
                items:
                  type: object
                  required: [key, effect]
                  properties:
                    key:
                      type: string
                      minLength: 1
                    value:
                      type: string
                    effect:
                      type: string
                      enum: [NoSchedule, NoExecute]
              nodePools:
                type: array
                description: >-
                  GPU node pools available on this cluster. Each pool
                  references an InferenceClass that describes the
                  hardware shape and (for provisioned clusters) how to
                  create the pool. System pools for control-plane
                  components are provisioned automatically.
                minItems: 1
                maxItems: 8
                x-kubernetes-list-type: map
                x-kubernetes-list-map-keys: [name]
                items:
                  type: object
                  required: [name, className]
                  properties:
                    name:
                      type: string
                      maxLength: 40
                    className:
                      type: string
                      description: >-
                        Name of the InferenceClass describing this pool's
                        hardware.
                      minLength: 1
                      maxLength: 253
                    nodeCount:
                      type: integer
                      default: 1
                      minimum: 0
                    minNodeCount:
                      type: integer
                      minimum: 0
                    maxNodeCount:
                      type: integer
                      description: >-
                        Maximum node count for autoscaling. Omit for
                        fixed-size pools.
                      minimum: 1
                    zones:
                      type: array
                      description: >-
                        Zones to restrict this node pool to. Required for
                        provisioned pools because not all zones in a
                        region have every GPU type.
                      items:
                        type: string
                    capacityBlock:
                      type: object
                      description: >-
                        Capacity Block reservation backing this node pool.
                        EKS only. Large GPU instances (e.g. p5en.48xlarge)
                        are rarely available on demand; AWS allocates them
                        via Capacity Blocks for ML. Set this to back the
                        pool with a Capacity Block you have purchased. The
                        pool's zones must match the reservation's
                        Availability Zone, and nodeCount must not exceed the
                        reserved instance count. Omit for on-demand pools.
                      required:
                      - capacityReservationId
                      properties:
                        capacityReservationId:
                          type: string
                          description: >-
                            The ID of the Capacity Reservation backing the
                            Capacity Block (e.g. cr-0123456789abcdef0).
                            Purchasing a Capacity Block yields this ID.
                          pattern: "^cr-[0-9a-f]+$"
                          minLength: 4
                          maxLength: 64
                    fabric:
                      type: object
                      description: >-
                        High-performance node-to-node fabric for multi-node
                        engines, so a gang's tensor-parallel traffic isn't
                        capped by TCP. Omit for standard VPC networking.
                      x-kubernetes-validations:
                      - rule: "!has(self.infiniband) || self.type == 'InfiniBand'"
                        message: fabric.infiniband is only valid when fabric.type is InfiniBand.
                      properties:
                        type:
                          type: string
                          default: None
                          description: >-
                            Fabric technology. None uses standard VPC
                            networking (TCP). EFA attaches Elastic Fabric
                            Adapter interfaces to each node for GPUDirect
                            RDMA across nodes; EKS only, and only useful on
                            EFA-capable instance types (e.g. p5en.48xlarge).
                            When any pool sets EFA, Modelplane installs the
                            EFA DRA driver on the cluster and the gang's pods
                            claim EFA devices alongside their GPUs.
                            InfiniBand places the pool's nodes on a physical
                            InfiniBand fabric for GPUDirect RDMA across
                            nodes; Nebius and AKS only, and only useful on
                            InfiniBand-capable shapes (e.g. gpu-h100-sxm on
                            Nebius, Standard_ND96isr_H100_v5 on AKS). On
                            Nebius the pool joins the fabric named in
                            infiniband.fabric; on AKS the pool's VM Scale Set
                            placement group lands its nodes on one fabric,
                            and Modelplane installs the NVIDIA network
                            operator on the cluster.
                          enum:
                          - None
                          - EFA
                          - InfiniBand
                        infiniband:
                          type: object
                          description: >-
                            InfiniBand fabric configuration. Required when
                            type is InfiniBand and the cluster source is
                            Nebius; not used on AKS.
                          required:
                          - fabric
                          properties:
                            fabric:
                              type: string
                              description: >-
                                Identifier of the physical InfiniBand fabric
                                to join (e.g. fabric-2). This selects existing
                                Nebius infrastructure, not a name for a new
                                resource: fabrics are per-region - see
                                https://docs.nebius.com/compute/clusters/gpu#fabrics
                                - and multi-node GPU capacity is allocated on
                                specific fabrics, so use the fabric your
                                capacity lives on.
                              minLength: 1
                              maxLength: 63
          status:
            type: object
            properties:
              providerConfigRef:
                type: object
                properties:
                  name:
                    type: string
                    description: >-
                      Name of the ProviderConfig targeting the remote cluster.
                      Used by ModelReplica to create resources on the cluster.
              gateway:
                type: object
                properties:
                  address:
                    type: string
                    description: >-
                      External IP of the inference gateway on the remote cluster.
                      Used by ModelDeployment for unified endpoint routing.
              cache:
                type: object
                description: >-
                  Observed ModelCache RWX storage state.
                properties:
                  storageClassName:
                    type: string
                    description: >-
                      Effective ReadWriteMany StorageClass name for ModelCache
                      PVCs on this cluster. ModelCache reads this to target
                      the cache PVC.
                    maxLength: 253
              gpuPools:
                type: array
                description: >-
                  Schedulable GPU node pools on this cluster, derived from the
                  referenced classes and the per-pool node counts.
                  ModelDeployment scheduling matches against these.
                maxItems: 8
                x-kubernetes-list-type: map
                x-kubernetes-list-map-keys: [name]
                items:
                  type: object
                  required: [name]
                  properties:
                    name:
                      type: string
                      description: >-
                        Node pool name, matching spec.nodePools[].name.
                        Used to pin a ModelReplica to a specific pool via
                        spec.nodePoolName.
                    nodes:
                      type: integer
                      description: >-
                        Number of nodes in this pool. Derived from
                        maxNodeCount (if autoscaling) or nodeCount.
                    devices:
                      type: array
                      description: >-
                        Devices copied from the pool's InferenceClass.
                        ModelDeployment.nodeSelector matches against these.
                      maxItems: 16
                      x-kubernetes-list-type: map
                      x-kubernetes-list-map-keys: [name]
                      items:
                        type: object
                        required: [name, driver]
                        properties:
                          name:
                            type: string
                            maxLength: 63
                          claim:
                            type: string
                            enum: [DRA, Synthetic]
                          driver:
                            type: string
                            maxLength: 253
                          deviceClassName:
                            type: string
                            maxLength: 253
                          count:
                            type: integer
                          attributes:
                            type: object
                            maxProperties: 32
                            additionalProperties:
                              type: object
                              properties:
                                string:
                                  type: string
                                  maxLength: 253
                                version:
                                  type: string
                                  maxLength: 32
                                bool:
                                  type: boolean
                                int:
                                  type: integer
                                  format: int64
                          capacity:
                            type: object
                            maxProperties: 32
                            additionalProperties:
                              type: object
                              required: [value]
                              properties:
                                value:
                                  type: string
                                  maxLength: 32
              namespace:
                type: string
                description: >-
                  Namespace where the internal XRs (cluster, backend) were created.
