apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: inferenceenvironments.modelplane.ai
spec:
  group: modelplane.ai
  names:
    categories: [crossplane, modelplane]
    kind: InferenceEnvironment
    plural: inferenceenvironments
    shortNames: [ie]
  scope: Cluster
  versions:
  - name: v1alpha1
    served: true
    referenceable: true
    additionalPrinterColumns:
    - name: READY
      type: string
      jsonPath: .status.conditions[?(@.type=='Ready')].status
    - name: GATEWAY
      type: string
      jsonPath: .status.gateway.address
    - name: AGE
      type: date
      jsonPath: .metadata.creationTimestamp
    schema:
      openAPIV3Schema:
        type: object
        required: [spec]
        properties:
          spec:
            type: object
            required: [cluster]
            properties:
              cluster:
                type: object
                required: [source]
                properties:
                  source:
                    type: string
                    description: >-
                      Cluster provisioning method.
                    enum: [GKE, Existing]
                  existing:
                    type: object
                    description: >-
                      Bring-your-own cluster configuration. Required when
                      source is Existing. Modelplane manages the inference
                      stack on the cluster but does not provision the
                      cluster itself.
                    required: [secretRef]
                    properties:
                      secretRef:
                        type: object
                        description: >-
                          Reference to a Secret containing a kubeconfig
                          for the existing cluster. The Secret must exist
                          in the modelplane-system namespace.
                        required: [name]
                        properties:
                          name:
                            type: string
                            description: Name of the kubeconfig Secret.
                            minLength: 1
                            maxLength: 253
                          key:
                            type: string
                            description: >-
                              Key within the Secret that holds the
                              kubeconfig data.
                            default: kubeconfig
                            minLength: 1
                            maxLength: 253
                      identitySecretRef:
                        type: object
                        description: >-
                          Optional reference to a Secret containing cloud
                          provider credentials for IAM-based authentication.
                          Required for GKE clusters where the kubeconfig
                          uses GCP IAM auth instead of embedded credentials.
                        required: [name]
                        properties:
                          name:
                            type: string
                            description: Name of the identity Secret.
                            minLength: 1
                            maxLength: 253
                          key:
                            type: string
                            description: >-
                              Key within the Secret that holds the
                              credential data.
                            default: private_key
                            minLength: 1
                            maxLength: 253
                      nodePools:
                        type: array
                        description: >-
                          Declared GPU capacity of the existing cluster.
                          Used by the scheduler to match models to
                          compatible environments. If omitted, the
                          environment reports no GPU capacity and only
                          models with no GPU requirements can be
                          scheduled.
                        maxItems: 8
                        x-kubernetes-list-type: map
                        x-kubernetes-list-map-keys: [name]
                        items:
                          type: object
                          required: [name]
                          properties:
                            name:
                              type: string
                              maxLength: 40
                            nodeCount:
                              type: integer
                              default: 1
                              minimum: 1
                            maxNodeCount:
                              type: integer
                              description: >-
                                Maximum node count for autoscaled pools.
                                Used instead of nodeCount when computing
                                GPU capacity for scheduling.
                              minimum: 1
                            gpu:
                              type: object
                              required: [acceleratorType, memory]
                              properties:
                                acceleratorType:
                                  type: string
                                  description: >-
                                    GPU accelerator type (e.g.
                                    nvidia-h100-80gb, nvidia-tesla-a100).
                                    Used as an informational label.
                                  minLength: 1
                                  maxLength: 63
                                acceleratorCount:
                                  type: integer
                                  description: Number of GPUs per node.
                                  default: 1
                                  minimum: 1
                                  maximum: 16
                                memory:
                                  type: string
                                  description: >-
                                    Per-GPU VRAM (e.g. "80Gi"). Used by the
                                    scheduler to determine how many GPUs a
                                    model needs and whether a pool has
                                    enough capacity.
                                  minLength: 1
                                  maxLength: 16
                  gke:
                    type: object
                    description: >-
                      GKE cluster configuration. Required when source is GKE.
                    required: [project, region, nodePools]
                    properties:
                      project:
                        type: string
                        minLength: 6
                        maxLength: 30
                      region:
                        type: string
                        minLength: 1
                        maxLength: 32
                      kubernetesVersion:
                        type: string
                        default: "1.35"
                      nodePools:
                        type: array
                        minItems: 1
                        maxItems: 8
                        x-kubernetes-list-type: map
                        x-kubernetes-list-map-keys: [name]
                        items:
                          type: object
                          required: [name, role, machineType]
                          properties:
                            name:
                              type: string
                              maxLength: 40
                            role:
                              type: string
                              enum: [System, GPU]
                            machineType:
                              type: string
                            diskSizeGb:
                              type: integer
                              default: 100
                            nodeCount:
                              type: integer
                              default: 1
                            minNodeCount:
                              type: integer
                              default: 0
                            maxNodeCount:
                              type: integer
                              default: 8
                            gpu:
                              type: object
                              description: >-
                                GPU configuration. Required when role is GPU.
                              required: [acceleratorType, memory]
                              properties:
                                acceleratorType:
                                  type: string
                                  description: >-
                                    GPU accelerator type (e.g.
                                    nvidia-h100-80gb, nvidia-tesla-a100).
                                    Passed to GCP when provisioning the
                                    node pool.
                                  minLength: 1
                                  maxLength: 63
                                acceleratorCount:
                                  type: integer
                                  description: Number of GPUs per node.
                                  default: 1
                                  minimum: 1
                                  maximum: 16
                                memory:
                                  type: string
                                  description: >-
                                    Per-GPU VRAM (e.g. "80Gi"). Used by the
                                    scheduler to determine how many GPUs a
                                    model needs and whether a pool has
                                    enough capacity.
                                  minLength: 1
                                  maxLength: 16
                            zones:
                              type: array
                              items:
                                type: string
          status:
            type: object
            properties:
              providerConfigRef:
                type: object
                properties:
                  name:
                    type: string
                    description: >-
                      Name of the ProviderConfig targeting the remote cluster.
                      Used by ModelPlacement to create resources on the cluster.
              gateway:
                type: object
                properties:
                  address:
                    type: string
                    description: >-
                      External IP of the inference gateway on the remote cluster.
                      Used by ModelDeployment for unified endpoint routing.
              capacity:
                type: object
                description: >-
                  Declared capacity computed from the node pool config.
                properties:
                  gpuPools:
                    type: array
                    description: >-
                      GPU pools with per-device VRAM, derived from the
                      node pool config.
                    items:
                      type: object
                      properties:
                        acceleratorType:
                          type: string
                        memory:
                          type: string
                          description: Per-GPU VRAM (e.g. "24Gi").
                        countPerNode:
                          type: integer
                          description: GPUs per node in this pool.
                        nodes:
                          type: integer
                          description: >-
                            Number of nodes in this pool. Derived from
                            maxNodeCount (if autoscaling) or nodeCount
                            in the node pool spec.
              namespace:
                type: string
                description: >-
                  Namespace where the internal XRs (cluster, backend) were created.
