apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: modelreplicas.modelplane.ai
spec:
  group: modelplane.ai
  names:
    categories: [crossplane, modelplane]
    kind: ModelReplica
    plural: modelreplicas
    shortNames: [mr]
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    referenceable: true
    additionalPrinterColumns:
    - name: CLUSTER
      type: string
      jsonPath: .spec.inferenceClusterRef.name
    schema:
      openAPIV3Schema:
        type: object
        required: [spec]
        properties:
          spec:
            type: object
            required: [inferenceClusterRef, workers]
            properties:
              inferenceClusterRef:
                type: object
                required: [name]
                description: >-
                  Reference to the InferenceCluster this replica targets.
                properties:
                  name:
                    type: string
              modelCacheRef:
                type: object
                required: [name]
                description: >-
                  Optional reference to a ModelCache mounted into the
                  engine pod. Inherited verbatim from the parent
                  ModelDeployment.
                properties:
                  name:
                    type: string
                    minLength: 1
              workers:
                type: object
                required: [topology, template]
                properties:
                  count:
                    type: integer
                    minimum: 1
                    default: 1
                  topology:
                    type: object
                    required: [tensor]
                    properties:
                      tensor:
                        type: integer
                        minimum: 1
                      pipeline:
                        type: integer
                        minimum: 1
                        default: 1
                  template:
                    type: object
                    properties:
                      metadata:
                        type: object
                        properties:
                          labels:
                            type: object
                            additionalProperties:
                              type: string
                          annotations:
                            type: object
                            additionalProperties:
                              type: string
                      spec:
                        type: object
                        required: [containers]
                        properties:
                          containers:
                            type: array
                            minItems: 1
                            x-kubernetes-validations:
                            - rule: "self.exists_one(c, c.name == 'engine')"
                              message: "containers must include exactly one container named 'engine'"
                            items:
                              type: object
                              required: [name, image]
                              properties:
                                name:
                                  type: string
                                  minLength: 1
                                image:
                                  type: string
                                  minLength: 1
                                args:
                                  type: array
                                  items:
                                    type: string
                                env:
                                  type: array
                                  items:
                                    type: object
                                    required: [name]
                                    properties:
                                      name:
                                        type: string
                                      value:
                                        type: string
                                      valueFrom:
                                        type: object
                                        properties:
                                          secretKeyRef:
                                            type: object
                                            required: [name, key]
                                            properties:
                                              name:
                                                type: string
                                              key:
                                                type: string
                                              optional:
                                                type: boolean
                                          configMapKeyRef:
                                            type: object
                                            required: [name, key]
                                            properties:
                                              name:
                                                type: string
                                              key:
                                                type: string
                                              optional:
                                                type: boolean
                          imagePullSecrets:
                            type: array
                            items:
                              type: object
                              required: [name]
                              properties:
                                name:
                                  type: string
          status:
            type: object
