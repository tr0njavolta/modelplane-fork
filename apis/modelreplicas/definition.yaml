apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: modelreplicas.modelplane.ai
spec:
  group: modelplane.ai
  names:
    categories: [crossplane, modelplane]
    kind: ModelReplica
    plural: modelreplicas
    shortNames: [mr]
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    referenceable: true
    additionalPrinterColumns:
    - name: CLUSTER
      type: string
      jsonPath: .spec.clusterName
    schema:
      openAPIV3Schema:
        type: object
        required: [spec]
        properties:
          spec:
            type: object
            required: [clusterName, engines]
            # A ModelReplica is machine-generated by the ModelDeployment compose
            # function, but the API server still serves and accepts it, so these
            # rules let the consuming function (and its backends) trust the
            # resolved shape rather than re-checking it in code or crashing on a
            # malformed hand-written replica. PrefillDecode serving runs one
            # Prefill and one Decode engine, each marking its phase; serving is
            # optional and defaults to Unified, under which no engine may carry a
            # phase.
            x-kubernetes-validations:
            - rule: "!has(self.serving) || self.serving.mode != 'PrefillDecode' || size(self.engines) == 2"
              message: "PrefillDecode serving requires exactly two engines (one Prefill, one Decode)"
            - rule: "!has(self.serving) || self.serving.mode != 'PrefillDecode' || self.engines.exists_one(e, has(e.phase) && e.phase == 'Prefill')"
              message: "PrefillDecode serving requires exactly one engine with phase Prefill"
            - rule: "!has(self.serving) || self.serving.mode != 'PrefillDecode' || self.engines.exists_one(e, has(e.phase) && e.phase == 'Decode')"
              message: "PrefillDecode serving requires exactly one engine with phase Decode"
            - rule: "(has(self.serving) && self.serving.mode == 'PrefillDecode') || !self.engines.exists(e, has(e.phase))"
              message: "engine phase may only be set when serving.mode is PrefillDecode"
            properties:
              clusterName:
                type: string
                minLength: 1
                description: >-
                  Name of the InferenceCluster this replica is pinned
                  to. Replicas are pinned at creation time. If the
                  cluster is temporarily unavailable the replica stays
                  pinned and the parent ModelDeployment surfaces the
                  degraded state via its conditions. If the cluster is
                  deleted entirely the parent ModelDeployment re-places
                  the replica on another viable cluster.
              modelCacheRef:
                type: object
                required: [name]
                description: >-
                  Optional reference to a ModelCache mounted into the
                  engine pods. Inherited verbatim from the parent
                  ModelDeployment.
                properties:
                  name:
                    type: string
                    minLength: 1
              serving:
                type: object
                description: >-
                  Serving mode, inherited verbatim from the parent
                  ModelDeployment. PrefillDecode fronts the engines with an
                  InferencePool + endpoint picker and role-labels the engine
                  each marks with its phase; Unified (or absent) fronts them
                  with a Service.
                properties:
                  mode:
                    type: string
                    enum: [Unified, PrefillDecode]
                    default: Unified
              engines:
                type: array
                description: >-
                  The replica's inference engines, mirroring the parent
                  ModelDeployment's engines with the scheduler's placement
                  resolved onto each member: the pool the scheduler pinned the
                  member to (nodePoolName) and the DRA device requests resolved
                  from that pool's InferenceClass devices (deviceRequests). The
                  members of one replica are co-scheduled onto a single
                  cluster, but may land on different pools - the scheduler
                  prefers one pool per engine and splits members only when no
                  pool satisfies them all.
                minItems: 1
                maxItems: 8
                x-kubernetes-list-type: map
                x-kubernetes-list-map-keys: [name]
                items:
                  type: object
                  required: [name, members]
                  # An engine is exactly one Standalone member, or one Leader
                  # and one Worker member - the two shapes the backends compose
                  # (a Deployment or a LeaderWorkerSet). A multi-node gang's size
                  # lives in the Worker member's worker.nodes, not in repeated
                  # Worker members, so members caps at two. select_backend
                  # switches on Standalone-present, and the llm-d backend
                  # dereferences the Leader and Worker members, so any other
                  # role combination would crash or compose the wrong workload.
                  #
                  # The scheduler also only places an engine where at least one
                  # member resolves a claimable device; an engine where no
                  # member carries deviceRequests would compose pods with no
                  # ResourceClaim at all - no GPUs anywhere.
                  x-kubernetes-validations:
                  - rule: >-
                      (self.members.size() == 1 && self.members[0].role == 'Standalone')
                      || (self.members.exists_one(m, m.role == 'Leader')
                          && self.members.exists(m, m.role == 'Worker')
                          && !self.members.exists(m, m.role == 'Standalone'))
                    message: >-
                      an engine must be either a single Standalone member or one
                      Leader and one Worker member
                  - rule: "self.members.exists(m, has(m.deviceRequests))"
                    message: >-
                      at least one member of an engine must carry
                      deviceRequests
                  properties:
                    name:
                      type: string
                      minLength: 1
                      maxLength: 63
                    copies:
                      type: integer
                      default: 1
                      minimum: 1
                      maximum: 64
                    phase:
                      type: string
                      enum: [Prefill, Decode]
                    members:
                      type: array
                      minItems: 1
                      maxItems: 2
                      x-kubernetes-list-type: atomic
                      items:
                        type: object
                        required: [nodePoolName, template]
                        # worker is meaningful only for a Worker member: a
                        # Standalone and a Leader are always exactly one pod on
                        # one node. The llm-d backend reads worker.nodes to size
                        # the gang, so worker on any other role is uncomposable.
                        x-kubernetes-validations:
                        - rule: "!has(self.worker) || self.role == 'Worker'"
                          message: "worker may only be set on a Worker member"
                        properties:
                          role:
                            type: string
                            enum: [Standalone, Leader, Worker]
                            default: Standalone
                          nodePoolName:
                            type: string
                            minLength: 1
                            description: >-
                              Name of the node pool on the pinned
                              InferenceCluster the scheduler selected for this
                              member. The scheduler pins every member to a
                              specific pool, so this is always set - a member
                              with no device requests of its own is pinned to
                              its engine's pool.
                          deviceRequests:
                            type: array
                            description: >-
                              Resolved DRA device requests for the member's
                              matched pool. The parent ModelDeployment's
                              compose function joins the member's nodeSelector
                              requests with the matched InferenceClass devices
                              and stamps the claim: DRA devices here. This
                              function turns each into a DeviceRequest in the
                              member's DRA ResourceClaimTemplate. Absent when
                              the member claims no devices - it carried no
                              nodeSelector, or its requests matched only
                              synthetic devices - in which case its pods get
                              no ResourceClaim and only the pool pin places
                              them. Never present and empty. At least one
                              member of each engine always carries requests:
                              the scheduler only places an engine where some
                              member yields a claimable device.
                            minItems: 1
                            maxItems: 16
                            x-kubernetes-list-type: map
                            x-kubernetes-list-map-keys: [name]
                            items:
                              type: object
                              required: [name, deviceClassName]
                              properties:
                                name:
                                  type: string
                                  description: >-
                                    Request name; becomes the DeviceRequest name.
                                  minLength: 1
                                  maxLength: 63
                                deviceClassName:
                                  type: string
                                  description: >-
                                    Cluster-scoped DRA DeviceClass to claim
                                    through, from the matched InferenceClass
                                    device.
                                  minLength: 1
                                  maxLength: 253
                                count:
                                  type: integer
                                  description: How many devices to claim.
                                  default: 1
                                  minimum: 1
                                  maximum: 64
                                selectors:
                                  type: array
                                  description: >-
                                    DRA CEL selectors copied verbatim from the
                                    nodeSelector request, ANDed in the
                                    DeviceRequest.
                                  maxItems: 8
                                  x-kubernetes-list-type: atomic
                                  items:
                                    type: object
                                    # A selector must carry a selector kind
                                    # (today only cel). An empty {} selector would
                                    # match any device, silently widening the DRA
                                    # claim the serving pod binds through.
                                    minProperties: 1
                                    properties:
                                      cel:
                                        type: string
                                        minLength: 1
                                        maxLength: 10240
                          worker:
                            type: object
                            # No schema default, mirroring the ModelDeployment
                            # XRD: defaults apply before CEL validation there,
                            # and the composed member should round-trip the
                            # deployment member unchanged.
                            required: [nodes]
                            properties:
                              nodes:
                                type: integer
                                minimum: 1
                                maximum: 63
                          template:
                            type: object
                            properties:
                              metadata:
                                type: object
                                properties:
                                  labels:
                                    type: object
                                    additionalProperties:
                                      type: string
                                  annotations:
                                    type: object
                                    additionalProperties:
                                      type: string
                              spec:
                                type: object
                                required: [containers]
                                properties:
                                  containers:
                                    type: array
                                    minItems: 1
                                    maxItems: 1
                                    x-kubernetes-validations:
                                    - rule: "self.exists_one(c, c.name == 'engine')"
                                      message: "the single container must be named 'engine'"
                                    items:
                                      type: object
                                      required: [name, image]
                                      properties:
                                        name:
                                          type: string
                                          minLength: 1
                                        image:
                                          type: string
                                          minLength: 1
                                        command:
                                          type: array
                                          items:
                                            type: string
                                        args:
                                          type: array
                                          items:
                                            type: string
                                        env:
                                          type: array
                                          items:
                                            type: object
                                            required: [name]
                                            properties:
                                              name:
                                                type: string
                                              value:
                                                type: string
                                              valueFrom:
                                                type: object
                                                properties:
                                                  secretKeyRef:
                                                    type: object
                                                    required: [name, key]
                                                    properties:
                                                      name:
                                                        type: string
                                                      key:
                                                        type: string
                                                      optional:
                                                        type: boolean
                                                  configMapKeyRef:
                                                    type: object
                                                    required: [name, key]
                                                    properties:
                                                      name:
                                                        type: string
                                                      key:
                                                        type: string
                                                      optional:
                                                        type: boolean
                                  imagePullSecrets:
                                    type: array
                                    items:
                                      type: object
                                      required: [name]
                                      properties:
                                        name:
                                          type: string
          status:
            type: object
