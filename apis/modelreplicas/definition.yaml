apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: modelreplicas.modelplane.ai
spec:
  group: modelplane.ai
  names:
    categories: [crossplane, modelplane]
    kind: ModelReplica
    plural: modelreplicas
    shortNames: [mr]
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    referenceable: true
    additionalPrinterColumns:
    - name: CLUSTER
      type: string
      jsonPath: .spec.clusterName
    schema:
      openAPIV3Schema:
        type: object
        required: [spec]
        properties:
          spec:
            type: object
            required: [clusterName, engines]
            properties:
              clusterName:
                type: string
                minLength: 1
                description: >-
                  Name of the InferenceCluster this replica is pinned
                  to. Replicas are pinned at creation time. If the
                  cluster is temporarily unavailable the replica stays
                  pinned and the parent ModelDeployment surfaces the
                  degraded state via its conditions. If the cluster is
                  deleted entirely the parent ModelDeployment re-places
                  the replica on another viable cluster.
              modelCacheRef:
                type: object
                required: [name]
                description: >-
                  Optional reference to a ModelCache mounted into the
                  engine pods. Inherited verbatim from the parent
                  ModelDeployment.
                properties:
                  name:
                    type: string
                    minLength: 1
              engines:
                type: array
                description: >-
                  The replica's inference engines, mirroring the parent
                  ModelDeployment's engines with the scheduler's placement
                  resolved onto each member: the pool the scheduler pinned the
                  member to (nodePoolName) and the DRA device requests resolved
                  from that pool's InferenceClass devices (deviceRequests). The
                  members of one replica are co-scheduled onto a single
                  cluster, but may land on different pools - the scheduler
                  prefers one pool per engine and splits members only when no
                  pool satisfies them all.
                minItems: 1
                maxItems: 8
                x-kubernetes-list-type: map
                x-kubernetes-list-map-keys: [name]
                items:
                  type: object
                  required: [name, members]
                  # The scheduler only places an engine where at least one
                  # member resolves a claimable device; an engine where no
                  # member carries deviceRequests would compose pods with no
                  # ResourceClaim at all - no GPUs anywhere. Enforce the
                  # invariant here too, so a hand-written ModelReplica can't
                  # slip a fully claimless engine past the backends.
                  x-kubernetes-validations:
                  - rule: "self.members.exists(m, has(m.deviceRequests))"
                    message: >-
                      at least one member of an engine must carry
                      deviceRequests
                  properties:
                    name:
                      type: string
                      minLength: 1
                      maxLength: 63
                    copies:
                      type: integer
                      default: 1
                      minimum: 1
                      maximum: 64
                    members:
                      type: array
                      minItems: 1
                      maxItems: 2
                      x-kubernetes-list-type: atomic
                      items:
                        type: object
                        required: [nodePoolName, template]
                        properties:
                          role:
                            type: string
                            enum: [Standalone, Leader, Worker]
                            default: Standalone
                          nodePoolName:
                            type: string
                            minLength: 1
                            description: >-
                              Name of the node pool on the pinned
                              InferenceCluster the scheduler selected for this
                              member. The scheduler pins every member to a
                              specific pool, so this is always set - a member
                              with no device requests of its own is pinned to
                              its engine's pool.
                          deviceRequests:
                            type: array
                            description: >-
                              Resolved DRA device requests for the member's
                              matched pool. The parent ModelDeployment's
                              compose function joins the member's nodeSelector
                              requests with the matched InferenceClass devices
                              and stamps the claim: DRA devices here. This
                              function turns each into a DeviceRequest in the
                              member's DRA ResourceClaimTemplate. Absent when
                              the member claims no devices - it carried no
                              nodeSelector, or its requests matched only
                              synthetic devices - in which case its pods get
                              no ResourceClaim and only the pool pin places
                              them. Never present and empty. At least one
                              member of each engine always carries requests:
                              the scheduler only places an engine where some
                              member yields a claimable device.
                            minItems: 1
                            maxItems: 16
                            x-kubernetes-list-type: map
                            x-kubernetes-list-map-keys: [name]
                            items:
                              type: object
                              required: [name, deviceClassName]
                              properties:
                                name:
                                  type: string
                                  description: >-
                                    Request name; becomes the DeviceRequest name.
                                  minLength: 1
                                  maxLength: 63
                                deviceClassName:
                                  type: string
                                  description: >-
                                    Cluster-scoped DRA DeviceClass to claim
                                    through, from the matched InferenceClass
                                    device.
                                  minLength: 1
                                  maxLength: 253
                                count:
                                  type: integer
                                  description: How many devices to claim.
                                  default: 1
                                  minimum: 1
                                  maximum: 64
                                selectors:
                                  type: array
                                  description: >-
                                    DRA CEL selectors copied verbatim from the
                                    nodeSelector request, ANDed in the
                                    DeviceRequest.
                                  maxItems: 8
                                  x-kubernetes-list-type: atomic
                                  items:
                                    type: object
                                    # A selector must carry a selector kind
                                    # (today only cel). An empty {} selector would
                                    # match any device, silently widening the DRA
                                    # claim the serving pod binds through.
                                    minProperties: 1
                                    properties:
                                      cel:
                                        type: string
                                        minLength: 1
                                        maxLength: 10240
                          worker:
                            type: object
                            # No schema default, mirroring the ModelDeployment
                            # XRD: defaults apply before CEL validation there,
                            # and the composed member should round-trip the
                            # deployment member unchanged.
                            required: [nodes]
                            properties:
                              nodes:
                                type: integer
                                minimum: 1
                                maximum: 63
                          template:
                            type: object
                            properties:
                              metadata:
                                type: object
                                properties:
                                  labels:
                                    type: object
                                    additionalProperties:
                                      type: string
                                  annotations:
                                    type: object
                                    additionalProperties:
                                      type: string
                              spec:
                                type: object
                                required: [containers]
                                properties:
                                  containers:
                                    type: array
                                    minItems: 1
                                    maxItems: 1
                                    x-kubernetes-validations:
                                    - rule: "self.exists_one(c, c.name == 'engine')"
                                      message: "the single container must be named 'engine'"
                                    items:
                                      type: object
                                      required: [name, image]
                                      properties:
                                        name:
                                          type: string
                                          minLength: 1
                                        image:
                                          type: string
                                          minLength: 1
                                        command:
                                          type: array
                                          items:
                                            type: string
                                        args:
                                          type: array
                                          items:
                                            type: string
                                        env:
                                          type: array
                                          items:
                                            type: object
                                            required: [name]
                                            properties:
                                              name:
                                                type: string
                                              value:
                                                type: string
                                              valueFrom:
                                                type: object
                                                properties:
                                                  secretKeyRef:
                                                    type: object
                                                    required: [name, key]
                                                    properties:
                                                      name:
                                                        type: string
                                                      key:
                                                        type: string
                                                      optional:
                                                        type: boolean
                                                  configMapKeyRef:
                                                    type: object
                                                    required: [name, key]
                                                    properties:
                                                      name:
                                                        type: string
                                                      key:
                                                        type: string
                                                      optional:
                                                        type: boolean
                                  imagePullSecrets:
                                    type: array
                                    items:
                                      type: object
                                      required: [name]
                                      properties:
                                        name:
                                          type: string
          status:
            type: object
