apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: models.modelplane.ai
spec:
  group: modelplane.ai
  names:
    categories: [crossplane, modelplane]
    kind: Model
    plural: models
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    referenceable: true
    additionalPrinterColumns:
    - name: READY
      type: string
      jsonPath: .status.conditions[?(@.type=='Ready')].status
    - name: MODEL
      type: string
      jsonPath: .spec.model.name
    - name: VRAM
      type: string
      jsonPath: .spec.resources.vram
    - name: AGE
      type: date
      jsonPath: .metadata.creationTimestamp
    schema:
      openAPIV3Schema:
        type: object
        required: [spec]
        properties:
          spec:
            type: object
            required: [model, source, resources, serving]
            properties:
              model:
                type: object
                required: [name]
                description: Model identity passed to the serving engine.
                properties:
                  name:
                    type: string
                    description: >-
                      Model name as the engine knows it
                      (e.g. "Qwen/Qwen2.5-0.5B-Instruct").
              source:
                type: string
                description: Where to download model weights from.
                enum: [HuggingFace]
              huggingFace:
                type: object
                description: >-
                  HuggingFace model source. Required when source is HuggingFace.
                required: [repo]
                properties:
                  repo:
                    type: string
                    description: >-
                      HuggingFace repo ID (e.g. "Qwen/Qwen2.5-0.5B-Instruct").
                  revision:
                    type: string
                    description: >-
                      Git revision (branch, tag, or commit). Defaults to main.
                    default: main
                  secretRef:
                    type: object
                    description: >-
                      Secret containing HuggingFace token for gated models.
                    properties:
                      name:
                        type: string
                      namespace:
                        type: string
                      key:
                        type: string
              resources:
                type: object
                required: [vram]
                description: >-
                  Hardware requirements. The scheduler divides total VRAM by
                  per-GPU VRAM of each candidate pool to compute GPU count.
                properties:
                  vram:
                    type: string
                    description: >-
                      Total VRAM the model needs (e.g. "24Gi", "140Gi").
                  cpu:
                    type: string
                    default: "4"
                  memory:
                    type: string
                    default: "16Gi"
              serving:
                type: array
                description: >-
                  Serving profiles. Each profile is a complete configuration
                  for serving this model on a specific (backend, engine) pair.
                  Array order is priority: the first profile matching a
                  candidate environment wins.
                minItems: 1
                maxItems: 8
                x-kubernetes-list-type: map
                x-kubernetes-list-map-keys: [name]
                items:
                  type: object
                  required: [name, backend]
                  x-kubernetes-validations:
                  - rule: "self.backend in ['KServe', 'Dynamo'] ? has(self.engine) : true"
                    message: "engine is required for KServe and Dynamo backends"
                  properties:
                    name:
                      type: string
                      description: >-
                        Unique name for this profile (e.g. "vllm-kserve",
                        "vllm-dynamo").
                      minLength: 1
                      maxLength: 63
                    backend:
                      type: string
                      description: >-
                        Backend this profile targets. Must match the
                        InferenceEnvironment's spec.backend.
                      enum: [KServe, Dynamo]
                    environmentSelector:
                      type: object
                      description: >-
                        Optional label selector for capability-based matching.
                        When set, this profile only matches IEs whose labels
                        satisfy the selector.
                      properties:
                        matchLabels:
                          type: object
                          additionalProperties:
                            type: string
                    engine:
                      type: object
                      description: >-
                        Engine configuration. Required for Kubernetes backends
                        (KServe, Dynamo).
                      required: [name, image]
                      properties:
                        name:
                          type: string
                          description: >-
                            Engine name (e.g. "vLLM", "SGLang"). Tells the
                            placement function engine-specific mechanics.
                          enum: [vLLM, SGLang]
                        image:
                          type: string
                          description: >-
                            Container image for the engine runtime.
                        args:
                          type: array
                          description: >-
                            Opaque CLI arguments passed through to the engine
                            container. Modelplane does not interpret these.
                          items:
                            type: string
          status:
            type: object
            description: >-
              Model has no composed resources. Status is conditions only.
