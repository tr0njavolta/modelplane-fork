apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: modeldeployments.modelplane.ai
spec:
  group: modelplane.ai
  names:
    categories: [crossplane, modelplane]
    kind: ModelDeployment
    plural: modeldeployments
    shortNames: [md]
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    referenceable: true
    additionalPrinterColumns:
    - name: READY
      type: string
      jsonPath: .status.conditions[?(@.type=='Ready')].status
    - name: MODEL
      type: string
      jsonPath: .spec.modelRef.name
    - name: ENVS
      type: string
      jsonPath: .status.placements.ready
    - name: ENDPOINT
      type: string
      jsonPath: .status.endpoint.url
    - name: AGE
      type: date
      jsonPath: .metadata.creationTimestamp
    schema:
      openAPIV3Schema:
        type: object
        required: [spec]
        properties:
          spec:
            type: object
            required: [modelRef, environments]
            properties:
              modelRef:
                type: object
                required: [name]
                description: Reference to a ClusterModel or Model.
                properties:
                  kind:
                    type: string
                    description: >-
                      Kind of model resource. Defaults to ClusterModel.
                    enum: [ClusterModel, Model]
                    default: ClusterModel
                  name:
                    type: string
              environments:
                type: integer
                minimum: 1
                maximum: 10
                description: >-
                  How many InferenceEnvironments to deploy to.
              environmentSelector:
                type: object
                description: >-
                  Optional label selector to filter environments.
                  If omitted, all ready environments are candidates.
                properties:
                  matchLabels:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
              scaling:
                type: object
                description: >-
                  How the model scales. Defaults to a single fixed
                  replica if not specified.
                default: {"signal": "Fixed", "fixed": {"replicas": 1}}
                required: [signal]
                properties:
                  signal:
                    type: string
                    description: >-
                      Scaling signal type. Each signal has a
                      corresponding config block that must be set.
                      Backends that don't support the requested signal
                      are not scheduling candidates.
                    enum: [Fixed, Concurrency]
                  fixed:
                    type: object
                    description: >-
                      Run a fixed number of replicas with no
                      autoscaling. Required when signal is Fixed.
                    required: [replicas]
                    properties:
                      replicas:
                        type: integer
                        minimum: 1
                        description: Number of replicas to run.
                  concurrency:
                    type: object
                    description: >-
                      Autoscale based on in-flight request concurrency.
                      Required when signal is Concurrency. Replicas
                      scale between minReplicas and maxReplicas based
                      on the number of concurrent requests each replica
                      is handling.
                    required: [maxReplicas, target]
                    properties:
                      minReplicas:
                        type: integer
                        minimum: 0
                        default: 1
                        description: >-
                          Minimum number of replicas. Set to 0 to allow
                          scale-to-zero when there is no traffic.
                      maxReplicas:
                        type: integer
                        minimum: 1
                        description: >-
                          Maximum number of replicas. The autoscaler
                          will not scale above this value. Must be >=
                          minReplicas.
                      target:
                        type: integer
                        minimum: 1
                        description: >-
                          Target number of concurrent in-flight requests
                          per replica. The autoscaler scales up when the
                          average concurrency per replica exceeds
                          target * utilization / 100. For example, with
                          target 32 and utilization 70, scaling triggers
                          at ~22 concurrent requests per replica.
                      utilization:
                        type: integer
                        minimum: 1
                        maximum: 100
                        default: 70
                        description: >-
                          Target utilization percentage. Provides
                          headroom before the target is fully saturated.
                          At 70 (the default), scaling triggers at 70%
                          of the target concurrency.
                      scaleDownDelay:
                        type: integer
                        minimum: 0
                        default: 300
                        description: >-
                          Seconds to wait before removing replicas after
                          load decreases. Prevents flapping when traffic
                          is bursty. Defaults to 300 (5 minutes).
          status:
            type: object
            properties:
              endpoint:
                type: object
                properties:
                  url:
                    type: string
                    description: >-
                      Unified OpenAI-compatible endpoint URL. Routes
                      across all healthy placements.
              placements:
                type: object
                properties:
                  total:
                    type: integer
                  ready:
                    type: integer
              model:
                type: object
                properties:
                  name:
                    type: string
