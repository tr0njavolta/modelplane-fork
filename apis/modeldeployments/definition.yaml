apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: modeldeployments.modelplane.ai
spec:
  group: modelplane.ai
  names:
    categories: [crossplane, modelplane]
    kind: ModelDeployment
    plural: modeldeployments
    shortNames: [md]
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    referenceable: true
    additionalPrinterColumns:
    - name: REPLICAS
      type: string
      jsonPath: .status.replicas.ready
    schema:
      openAPIV3Schema:
        type: object
        required: [spec]
        properties:
          spec:
            type: object
            required: [replicas, workers]
            properties:
              replicas:
                type: integer
                minimum: 1
                maximum: 10
                description: >-
                  How many ModelReplicas to fan out to. Each replica is a
                  complete serving instance scheduled to one InferenceCluster.
              clusterSelector:
                type: object
                description: >-
                  Optional label selector to filter InferenceClusters.
                  If omitted, all ready clusters are candidates.
                properties:
                  matchLabels:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
              workers:
                type: object
                required: [topology, template]
                description: >-
                  Compute shape of one worker. Modelplane composes one
                  worker (or workers.count workers) per ModelReplica.
                properties:
                  count:
                    type: integer
                    minimum: 1
                    default: 1
                    description: >-
                      Number of workers per replica. Defaults to 1.
                  topology:
                    type: object
                    required: [tensor]
                    description: >-
                      Compute topology for one worker. The axes are
                      independent and compose multiplicatively: GPUs per
                      node = tensor, nodes per worker = pipeline.
                    properties:
                      tensor:
                        type: integer
                        minimum: 1
                        description: >-
                          GPUs per node. Required.
                      pipeline:
                        type: integer
                        minimum: 1
                        default: 1
                        description: >-
                          Nodes per worker. Defaults to 1 (single-node).
                          Values greater than 1 enable multi-node serving
                          via LeaderWorkerSet.
                  template:
                    type: object
                    description: >-
                      Pod template for inference workers. A curated subset
                      of PodTemplateSpec.
                    properties:
                      metadata:
                        type: object
                        description: >-
                          Metadata applied to inference pods. Useful for
                          labels and annotations that control cluster-level
                          features like service mesh injection.
                        properties:
                          labels:
                            type: object
                            additionalProperties:
                              type: string
                          annotations:
                            type: object
                            additionalProperties:
                              type: string
                      spec:
                        type: object
                        required: [containers]
                        description: >-
                          Pod spec for inference workers.
                        properties:
                          containers:
                            type: array
                            minItems: 1
                            description: >-
                              Containers for the inference pod. The container
                              named "engine" is the inference engine; additional
                              containers pass through as sidecars.
                            x-kubernetes-validations:
                            - rule: "self.exists_one(c, c.name == 'engine')"
                              message: "containers must include exactly one container named 'engine'"
                            items:
                              type: object
                              required: [name, image]
                              properties:
                                name:
                                  type: string
                                  minLength: 1
                                  description: >-
                                    Container name. The container named "engine"
                                    is the inference engine.
                                image:
                                  type: string
                                  minLength: 1
                                  description: Container image.
                                args:
                                  type: array
                                  description: >-
                                    Container args. For the engine container,
                                    these are passed through to the serving
                                    engine. Includes the model identifier
                                    (e.g. --model=...).
                                  items:
                                    type: string
                                env:
                                  type: array
                                  description: >-
                                    Environment variables. Supports
                                    valueFrom.secretKeyRef for secrets
                                    like HF_TOKEN.
                                  items:
                                    type: object
                                    required: [name]
                                    properties:
                                      name:
                                        type: string
                                      value:
                                        type: string
                                      valueFrom:
                                        type: object
                                        properties:
                                          secretKeyRef:
                                            type: object
                                            required: [name, key]
                                            properties:
                                              name:
                                                type: string
                                              key:
                                                type: string
                                              optional:
                                                type: boolean
                                          configMapKeyRef:
                                            type: object
                                            required: [name, key]
                                            properties:
                                              name:
                                                type: string
                                              key:
                                                type: string
                                              optional:
                                                type: boolean
                          imagePullSecrets:
                            type: array
                            description: >-
                              Image pull secrets for private registries
                              (NGC etc.).
                            items:
                              type: object
                              required: [name]
                              properties:
                                name:
                                  type: string
          status:
            type: object
            properties:
              replicas:
                type: object
                properties:
                  total:
                    type: integer
                  ready:
                    type: integer
