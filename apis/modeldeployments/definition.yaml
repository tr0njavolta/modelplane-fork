apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: modeldeployments.modelplane.ai
spec:
  group: modelplane.ai
  names:
    categories: [crossplane, modelplane]
    kind: ModelDeployment
    plural: modeldeployments
    shortNames: [md]
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    referenceable: true
    additionalPrinterColumns:
    - name: READY
      type: string
      jsonPath: .status.conditions[?(@.type=='Ready')].status
    - name: REPLICAS
      type: string
      jsonPath: .status.replicas.ready
    - name: ENDPOINT
      type: string
      jsonPath: .status.endpoint.url
    - name: AGE
      type: date
      jsonPath: .metadata.creationTimestamp
    schema:
      openAPIV3Schema:
        type: object
        required: [spec]
        properties:
          spec:
            type: object
            required: [replicas, workers, engine]
            properties:
              replicas:
                type: integer
                minimum: 1
                maximum: 10
                description: >-
                  How many ModelReplicas to fan out to. Each replica is a
                  complete serving instance scheduled to one InferenceCluster.
              clusterSelector:
                type: object
                description: >-
                  Optional label selector to filter InferenceClusters.
                  If omitted, all ready clusters are candidates.
                properties:
                  matchLabels:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
              workers:
                type: object
                required: [topology, resources]
                description: >-
                  Compute shape of one worker. Modelplane composes one
                  worker (or workers.count workers) per ModelReplica.
                properties:
                  count:
                    type: integer
                    minimum: 1
                    default: 1
                    description: >-
                      Number of workers per replica. Defaults to 1.
                  topology:
                    type: object
                    required: [strategy]
                    description: >-
                      Compute topology for one worker. The strategy
                      discriminator selects between single-node (Tensor)
                      and multi-node (TensorPipeline) serving.
                    properties:
                      strategy:
                        type: string
                        enum: [Tensor, TensorPipeline]
                        description: >-
                          Tensor: single-node tensor parallelism. One pod
                          with `tensor` GPUs. TensorPipeline: multi-node
                          tensor+pipeline parallelism. `pipeline` pods
                          each with `tensor` GPUs.
                      tensor:
                        type: integer
                        minimum: 1
                        description: >-
                          GPUs per node. Required for both strategies.
                      pipeline:
                        type: integer
                        minimum: 2
                        description: >-
                          Number of nodes per worker. Required when
                          strategy is TensorPipeline.
                  resources:
                    type: object
                    required: [cpu, memory]
                    description: >-
                      Non-GPU pod resources for one worker. GPU count is
                      derived from topology.
                    properties:
                      cpu:
                        type: string
                        description: CPU request and limit (e.g. "4").
                        minLength: 1
                      memory:
                        type: string
                        description: Memory request and limit (e.g. "16Gi").
                        minLength: 1
              engine:
                type: object
                required: [image]
                description: >-
                  Serving engine configuration. Modelplane treats engine
                  args opaquely - they pass through to the container.
                properties:
                  image:
                    type: string
                    description: Container image.
                    minLength: 1
                  args:
                    type: array
                    description: >-
                      Engine args. Opaque; passed through to the container.
                      Includes the model identifier (e.g. --model=...).
                    items:
                      type: string
                  env:
                    type: array
                    description: >-
                      Environment variables. Standard PodSpec env shape;
                      supports valueFrom.secretKeyRef for HF_TOKEN etc.
                    items:
                      type: object
                      required: [name]
                      properties:
                        name:
                          type: string
                        value:
                          type: string
                        valueFrom:
                          type: object
                          properties:
                            secretKeyRef:
                              type: object
                              required: [name, key]
                              properties:
                                name:
                                  type: string
                                key:
                                  type: string
                                optional:
                                  type: boolean
                            configMapKeyRef:
                              type: object
                              required: [name, key]
                              properties:
                                name:
                                  type: string
                                key:
                                  type: string
                                optional:
                                  type: boolean
                  imagePullSecrets:
                    type: array
                    description: >-
                      Image pull secrets for private registries (NGC etc.).
                    items:
                      type: object
                      required: [name]
                      properties:
                        name:
                          type: string
          status:
            type: object
            properties:
              endpoint:
                type: object
                properties:
                  url:
                    type: string
                    description: >-
                      Unified OpenAI-compatible endpoint URL. Routes
                      across all healthy replicas.
              replicas:
                type: object
                properties:
                  total:
                    type: integer
                  ready:
                    type: integer
