apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: servingstacks.infrastructure.modelplane.ai
spec:
  group: infrastructure.modelplane.ai
  names:
    categories:
    - crossplane
    - modelplane
    kind: ServingStack
    plural: servingstacks
    shortNames:
    - ss
  scope: Namespaced
  versions:
  - name: v1alpha1
    referenceable: true
    additionalPrinterColumns:
    - name: GATEWAY
      type: string
      jsonPath: .status.gateway.address
    schema:
      openAPIV3Schema:
        description: >-
          A ServingStack installs the serving substrate (LeaderWorkerSet,
          Gateway API, cert-manager, Prometheus) on a Kubernetes cluster.
        properties:
          spec:
            description: ServingStackSpec defines the desired state of ServingStack.
            required:
            - secrets
            properties:
              secrets:
                type: array
                description: >-
                  Secrets used to authenticate to the target cluster. Typically
                  sourced from a GKECluster's status.secrets. All secrets must
                  be in the same namespace as this ServingStack. A Kubeconfig
                  secret is required. If a cloud-specific credential secret is
                  present (e.g. GCPServiceAccountKey), the ProviderConfigs
                  will use it for identity-based authentication instead of
                  relying on the kubeconfig's embedded credentials.
                minItems: 1
                items:
                  type: object
                  required:
                  - type
                  - name
                  - key
                  properties:
                    type:
                      type: string
                      description: >-
                        The type of credential this secret contains. Kubeconfig
                        is required. Cloud-specific types are optional and
                        determine how the ProviderConfigs authenticate.
                      enum:
                      - Kubeconfig
                      - GCPServiceAccountKey
                    name:
                      type: string
                      description: Name of the Secret.
                      maxLength: 253
                    key:
                      type: string
                      description: Key within the Secret that holds the credential data.
                      maxLength: 253
              versions:
                type: object
                description: >-
                  Version pins for each component. Defaults are the latest
                  tested combination. Override individual versions to upgrade
                  components independently.
                properties:
                  gatewayApi:
                    type: string
                    default: "v1.5.1"
                    description: Gateway API CRD version.
                    minLength: 1
                    maxLength: 32
                  certManager:
                    type: string
                    default: "v1.17.1"
                    description: cert-manager chart version.
                    minLength: 1
                    maxLength: 32
                  envoyGateway:
                    type: string
                    default: "v1.3.0"
                    description: Envoy Gateway chart version.
                    minLength: 1
                    maxLength: 32
                  prometheus:
                    type: string
                    default: "72.6.2"
                    description: kube-prometheus-stack chart version.
                    minLength: 1
                    maxLength: 32
                  leaderWorkerSet:
                    type: string
                    default: "v0.8.0"
                    description: LeaderWorkerSet chart version.
                    minLength: 1
                    maxLength: 32
              gateway:
                type: object
                description: >-
                  Configuration for the cluster's inference traffic gateway.
                properties:
                  className:
                    type: string
                    default: envoy
                    description: >-
                      GatewayClass name. Override if the cluster already has a
                      GatewayClass named envoy.
                    minLength: 1
                    maxLength: 63
                  listeners:
                    type: array
                    description: >-
                      Gateway listeners. Defaults to a single HTTP listener on
                      port 80 if not specified.
                    maxItems: 8
                    x-kubernetes-list-type: map
                    x-kubernetes-list-map-keys:
                    - name
                    items:
                      type: object
                      required:
                      - name
                      - port
                      - protocol
                      properties:
                        name:
                          type: string
                          description: Unique listener name.
                          maxLength: 63
                          minLength: 1
                        port:
                          type: integer
                          description: Port number for this listener.
                          minimum: 1
                          maximum: 65535
                        protocol:
                          type: string
                          description: Protocol for this listener.
                          enum:
                          - HTTP
                          - TCP
            type: object
          status:
            description: ServingStackStatus defines the observed state of ServingStack.
            properties:
              gateway:
                type: object
                description: Status of the cluster's inference gateway.
                properties:
                  address:
                    type: string
                    maxLength: 256
                    description: >-
                      The gateway's external address, once assigned by the
                      cloud load balancer.
            type: object
        required:
        - spec
        type: object
    served: true
