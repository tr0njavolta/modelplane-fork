apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: modelplacements.modelplane.ai
spec:
  group: modelplane.ai
  names:
    categories: [crossplane, modelplane]
    kind: ModelPlacement
    plural: modelplacements
    shortNames: [mp]
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    referenceable: true
    additionalPrinterColumns:
    - name: READY
      type: string
      jsonPath: .status.conditions[?(@.type=='Ready')].status
    - name: MODEL
      type: string
      jsonPath: .spec.modelRef.name
    - name: ENVIRONMENT
      type: string
      jsonPath: .spec.inferenceEnvironmentRef.name
    - name: ENDPOINT
      type: string
      jsonPath: .status.endpoint.url
    - name: AGE
      type: date
      jsonPath: .metadata.creationTimestamp
    schema:
      openAPIV3Schema:
        type: object
        required: [spec]
        properties:
          spec:
            type: object
            required: [modelRef, inferenceEnvironmentRef]
            properties:
              modelRef:
                type: object
                required: [name]
                description: Reference to a ClusterModel or Model.
                properties:
                  kind:
                    type: string
                    description: >-
                      Kind of model resource. Defaults to ClusterModel.
                    enum: [ClusterModel, Model]
                    default: ClusterModel
                  name:
                    type: string
              inferenceEnvironmentRef:
                type: object
                required: [name]
                description: Reference to an InferenceEnvironment.
                properties:
                  name:
                    type: string
              scaling:
                type: object
                description: >-
                  How the model scales. Copied from the parent
                  ModelDeployment.
                default: {"signal": "Fixed", "fixed": {"replicas": 1}}
                required: [signal]
                properties:
                  signal:
                    type: string
                    description: >-
                      Scaling signal type. Each signal has a
                      corresponding config block that must be set.
                    enum: [Fixed, Concurrency]
                  fixed:
                    type: object
                    description: >-
                      Run a fixed number of replicas with no
                      autoscaling. Required when signal is Fixed.
                    required: [replicas]
                    properties:
                      replicas:
                        type: integer
                        minimum: 1
                        description: Number of replicas to run.
                  concurrency:
                    type: object
                    description: >-
                      Autoscale based on in-flight request concurrency.
                      Required when signal is Concurrency.
                    required: [maxReplicas, target]
                    properties:
                      minReplicas:
                        type: integer
                        minimum: 0
                        default: 1
                        description: >-
                          Minimum number of replicas. Set to 0 to allow
                          scale-to-zero when there is no traffic.
                      maxReplicas:
                        type: integer
                        minimum: 1
                        description: >-
                          Maximum number of replicas. Must be >=
                          minReplicas.
                      target:
                        type: integer
                        minimum: 1
                        description: >-
                          Target number of concurrent in-flight requests
                          per replica. Scaling triggers when average
                          concurrency exceeds target * utilization / 100.
                      utilization:
                        type: integer
                        minimum: 1
                        maximum: 100
                        default: 70
                        description: >-
                          Target utilization percentage. Provides
                          headroom before the target is fully saturated.
                          Defaults to 70.
                      scaleDownDelay:
                        type: integer
                        minimum: 0
                        default: 300
                        description: >-
                          Seconds to wait before removing replicas after
                          load decreases. Defaults to 300 (5 minutes).
          status:
            type: object
            properties:
              servingProfile:
                type: object
                description: >-
                  The serving profile resolved by the placement function.
                  Shows which (backend, engine, image) was selected for
                  this placement.
                properties:
                  name:
                    type: string
                  backend:
                    type: string
                  engine:
                    type: object
                    properties:
                      name:
                        type: string
                      image:
                        type: string
              endpoint:
                type: object
                properties:
                  url:
                    type: string
                    description: >-
                      Per-placement endpoint URL on the remote cluster's
                      gateway. Format:
                      http://<gateway-ip>/<namespace>/<model-name>/v1
              model:
                type: object
                properties:
                  name:
                    type: string
                    description: Resolved model name from ClusterModel.
              resources:
                type: object
                description: >-
                  Resources consumed by this placement. Copied from the
                  model spec at placement time. Used by the deploy function
                  to compute available capacity per environment.
                properties:
                  gpu:
                    type: object
                    properties:
                      count:
                        type: integer
              routing:
                type: object
                description: >-
                  Routing endpoint for this placement. Used by
                  ModelDeployment to build the aggregated HTTPRoute.
                properties:
                  backendName:
                    type: string
                    description: >-
                      Crossplane-generated name of the Backend resource
                      composed by this placement.
