apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: kservestacks.infrastructure.modelplane.ai
spec:
  group: infrastructure.modelplane.ai
  names:
    categories:
    - crossplane
    - modelplane
    kind: KServeStack
    plural: kservestacks
    shortNames:
    - kss
  scope: Cluster
  versions:
  - name: v1alpha1
    referenceable: true
    additionalPrinterColumns:
    - name: READY
      type: string
      jsonPath: .status.conditions[?(@.type=='Ready')].status
    - name: KSERVE
      type: string
      jsonPath: .spec.versions.kserve
    - name: GATEWAY
      type: string
      jsonPath: .status.gateway.address
    - name: AGE
      type: date
      jsonPath: .metadata.creationTimestamp
    schema:
      openAPIV3Schema:
        description: >-
          A KServeStack installs the full KServe inference stack on a
          Kubernetes cluster, including cert-manager, Gateway API, Envoy
          Gateway, LeaderWorkerSet, and KServe itself.
        properties:
          spec:
            description: KServeStackSpec defines the desired state of KServeStack.
            required:
            - providerConfigRef
            properties:
              providerConfigRef:
                type: object
                required:
                - name
                description: >-
                  Reference to the ProviderConfig targeting the cluster where
                  KServe should be installed. Typically output by a GKECluster
                  or similar cluster XR.
                properties:
                  name:
                    type: string
                    description: Name of the provider-kubernetes and provider-helm ProviderConfig.
                    maxLength: 253
                    minLength: 1
              versions:
                type: object
                description: >-
                  Version pins for each component. Defaults are the latest
                  tested combination. Override individual versions to upgrade
                  components independently.
                properties:
                  kserve:
                    type: string
                    default: "v0.16.0"
                    description: KServe LLMInferenceService chart version.
                    minLength: 1
                    maxLength: 32
                  certManager:
                    type: string
                    default: "v1.17.1"
                    description: cert-manager chart version.
                    minLength: 1
                    maxLength: 32
                  envoyGateway:
                    type: string
                    default: "v1.3.0"
                    description: Envoy Gateway chart version.
                    minLength: 1
                    maxLength: 32
                  leaderWorkerSet:
                    type: string
                    default: "v0.7.0"
                    description: LeaderWorkerSet chart version.
                    minLength: 1
                    maxLength: 32
              gateway:
                type: object
                description: >-
                  Configuration for the cluster's inference traffic gateway.
                properties:
                  className:
                    type: string
                    default: envoy
                    description: >-
                      GatewayClass name. Override if the cluster already has a
                      GatewayClass named envoy.
                    minLength: 1
                    maxLength: 63
                  listeners:
                    type: array
                    description: >-
                      Gateway listeners. Defaults to a single HTTP listener on
                      port 80 if not specified.
                    maxItems: 8
                    x-kubernetes-list-type: map
                    x-kubernetes-list-map-keys:
                    - name
                    items:
                      type: object
                      required:
                      - name
                      - port
                      - protocol
                      properties:
                        name:
                          type: string
                          description: Unique listener name.
                          maxLength: 63
                          minLength: 1
                        port:
                          type: integer
                          description: Port number for this listener.
                          minimum: 1
                          maximum: 65535
                        protocol:
                          type: string
                          description: Protocol for this listener.
                          enum:
                          - HTTP
                          - TCP
            type: object
          status:
            description: KServeStackStatus defines the observed state of KServeStack.
            properties:
              gateway:
                type: object
                description: Status of the cluster's inference gateway.
                properties:
                  address:
                    type: string
                    maxLength: 256
                    description: >-
                      The gateway's external address, once assigned by the
                      cloud load balancer.
            type: object
        required:
        - spec
        type: object
    served: true
