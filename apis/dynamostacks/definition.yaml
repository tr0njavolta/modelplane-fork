apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: dynamostacks.infrastructure.modelplane.ai
spec:
  group: infrastructure.modelplane.ai
  names:
    categories:
    - crossplane
    - modelplane
    kind: DynamoStack
    plural: dynamostacks
    shortNames:
    - ds
  scope: Namespaced
  versions:
  - name: v1alpha1
    referenceable: true
    additionalPrinterColumns:
    - name: READY
      type: string
      jsonPath: .status.conditions[?(@.type=='Ready')].status
    - name: DYNAMO
      type: string
      jsonPath: .spec.versions.dynamo
    - name: GATEWAY
      type: string
      jsonPath: .status.gateway.address
    - name: AGE
      type: date
      jsonPath: .metadata.creationTimestamp
    schema:
      openAPIV3Schema:
        description: >-
          A DynamoStack installs the NVIDIA Dynamo inference framework on a
          Kubernetes cluster, including cert-manager, Envoy Gateway, and the
          dynamo-platform Helm chart (operator, etcd, NATS).
        properties:
          spec:
            description: DynamoStackSpec defines the desired state of DynamoStack.
            required:
            - secrets
            properties:
              secrets:
                type: array
                description: >-
                  Secrets used to authenticate to the target cluster. A
                  Kubeconfig secret is required.
                minItems: 1
                items:
                  type: object
                  required:
                  - type
                  - name
                  - key
                  properties:
                    type:
                      type: string
                      description: >-
                        The type of credential this secret contains.
                      enum:
                      - Kubeconfig
                      - GCPServiceAccountKey
                    name:
                      type: string
                      description: Name of the Secret.
                      maxLength: 253
                    key:
                      type: string
                      description: Key within the Secret that holds the credential data.
                      maxLength: 253
              versions:
                type: object
                description: >-
                  Version pins for each component.
                properties:
                  dynamo:
                    type: string
                    default: "1.0.0"
                    description: Dynamo platform chart version.
                    minLength: 1
                    maxLength: 32
                  certManager:
                    type: string
                    default: "v1.17.1"
                    description: cert-manager chart version.
                    minLength: 1
                    maxLength: 32
                  envoyGateway:
                    type: string
                    default: "v1.3.0"
                    description: Envoy Gateway chart version.
                    minLength: 1
                    maxLength: 32
              gateway:
                type: object
                description: >-
                  Configuration for the cluster's inference traffic gateway.
                properties:
                  className:
                    type: string
                    default: envoy
                    description: >-
                      GatewayClass name.
                    minLength: 1
                    maxLength: 63
                  listeners:
                    type: array
                    description: >-
                      Gateway listeners. Defaults to a single HTTP listener on
                      port 80 if not specified.
                    maxItems: 8
                    x-kubernetes-list-type: map
                    x-kubernetes-list-map-keys:
                    - name
                    items:
                      type: object
                      required:
                      - name
                      - port
                      - protocol
                      properties:
                        name:
                          type: string
                          description: Unique listener name.
                          maxLength: 63
                          minLength: 1
                        port:
                          type: integer
                          description: Port number for this listener.
                          minimum: 1
                          maximum: 65535
                        protocol:
                          type: string
                          description: Protocol for this listener.
                          enum:
                          - HTTP
                          - TCP
            type: object
          status:
            description: DynamoStackStatus defines the observed state of DynamoStack.
            properties:
              gateway:
                type: object
                description: Status of the cluster's inference gateway.
                properties:
                  address:
                    type: string
                    maxLength: 256
                    description: >-
                      The gateway's external address, once assigned by the
                      cloud load balancer.
            type: object
        required:
        - spec
        type: object
    served: true
