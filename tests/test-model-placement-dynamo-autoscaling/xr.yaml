apiVersion: modelplane.ai/v1alpha1
kind: ModelPlacement
metadata:
  name: qwen-dynamo-us-central
  namespace: ml-team
spec:
  modelRef:
    name: qwen-0.5b
  inferenceEnvironmentRef:
    name: dynamo-us-central
  scaling:
    signal: Concurrency
    concurrency:
      minReplicas: 1
      maxReplicas: 3
      target: 10
      utilization: 70
      scaleDownDelay: 300
