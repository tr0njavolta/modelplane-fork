apiVersion: infrastructure.modelplane.ai/v1alpha1
kind: KServeBackend
metadata:
  name: gpu-us-central1-kserve
  namespace: gpu-us-central1
spec:
  secrets:
  - type: Kubeconfig
    name: gpu-us-central1-kubeconfig
    key: kubeconfig
  - type: GCPServiceAccountKey
    name: gpu-us-central1-sa-key
    key: private_key
  versions:
    kserve: "v0.16.0"
    certManager: "v1.17.1"
    envoyGateway: "v1.3.0"
    leaderWorkerSet: "v0.7.0"
  gateway:
    className: envoy
    listeners:
    - name: http
      port: 80
      protocol: HTTP
