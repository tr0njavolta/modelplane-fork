apiVersion: modelplane.ai/v1alpha1
kind: InferenceEnvironment
metadata:
  name: demo-us-central
  labels:
    modelplane.ai/environment: "true"
    modelplane.ai/region: us-central
spec:
  cluster:
    source: GKE
    gke:
      project: my-gcp-project
      region: us-central1
      nodePools:
      - name: system
        role: System
        machineType: e2-standard-4
        nodeCount: 1
        minNodeCount: 1
        maxNodeCount: 2
      - name: gpu-l4
        role: GPU
        machineType: g2-standard-8
        gpu:
          acceleratorType: nvidia-l4
          acceleratorCount: 1
          memory: 24Gi
        nodeCount: 1
        minNodeCount: 0
        maxNodeCount: 2
        zones:
        - us-central1-a
        - us-central1-c
