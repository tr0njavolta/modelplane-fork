apiVersion: modelplane.ai/v1alpha1
kind: ModelReplica
metadata:
  name: llama405b-h100-cluster
  namespace: ml-team
  labels:
    modelplane.ai/deployment: llama405b
spec:
  inferenceClusterRef:
    name: h100-cluster
  workers:
    count: 2
    topology:
      tensor: 8
      pipeline: 2
    template:
      spec:
        containers:
        - name: engine
          image: vllm/vllm-openai:v0.7.3
          args:
          - "--model=meta-llama/Llama-3.1-405B"
