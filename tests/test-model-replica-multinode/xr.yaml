apiVersion: modelplane.ai/v1alpha1
kind: ModelReplica
metadata:
  name: llama405b-h100-cluster
  namespace: ml-team
spec:
  inferenceClusterRef:
    name: h100-cluster
  workers:
    topology:
      strategy: TensorPipeline
      tensor: 8
      pipeline: 2
    resources:
      cpu: "16"
      memory: "256Gi"
  engine:
    image: vllm/vllm-openai:v0.7.3
    args:
    - "--model=meta-llama/Llama-3.1-405B"
