apiVersion: modelplane.ai/v1alpha1
kind: ModelReplica
metadata:
  name: qwen-demo-demo-us-central
  namespace: ml-team
  labels:
    modelplane.ai/deployment: qwen-demo
spec:
  inferenceClusterRef:
    name: demo-us-central
  workers:
    topology:
      tensor: 1
    template:
      spec:
        containers:
        - name: engine
          image: vllm/vllm-openai:v0.7.3
          args:
          - "--model=Qwen/Qwen2.5-0.5B-Instruct"
