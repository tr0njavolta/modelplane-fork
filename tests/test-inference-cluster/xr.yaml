apiVersion: modelplane.ai/v1alpha1
kind: InferenceCluster
metadata:
  name: demo-us-central
  labels:
    modelplane.ai/cluster: "true"
    modelplane.ai/region: us-central
spec:
  cluster:
    source: GKE
    gke:
      project: my-gcp-project
      region: us-central1
  nodePools:
  - name: gpu-l4
    className: gke-l4-1x-g2
    nodeCount: 1
    minNodeCount: 0
    maxNodeCount: 2
    zones:
    - us-central1-a
    - us-central1-c
