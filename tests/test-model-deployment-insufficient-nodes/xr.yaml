apiVersion: modelplane.ai/v1alpha1
kind: ModelDeployment
metadata:
  name: llama405b-demo
  namespace: ml-team
spec:
  replicas: 1
  workers:
    topology:
      tensor: 8
      pipeline: 2
    template:
      spec:
        containers:
        - name: engine
          image: vllm/vllm-openai:v0.7.3
          args:
          - "--model=meta-llama/Llama-3.1-405B"
